<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Human Stack: Daily Quest</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: ‘Poppins’, sans-serif;
            background: linear-gradient(135deg, #1a0033 0%, #0d001a 100%);
            color: #d4af37;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Landing Page */
        .landing-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            gap: 40px;
        }

        .landing-page.hidden {
            display: none;
        }

        .title-section {
            animation: glow-in 1s ease-out;
        }

        .title-section h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.6), 0 0 40px rgba(212, 175, 55, 0.3);
            margin-bottom: 20px;
            color: #d4af37;
        }

        .title-section p {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            color: #b8a3d1;
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 40px;
        }

        .level-display {
            background: rgba(0, 0, 0, 0.6);
            border: 3px solid #d4af37;
            border-radius: 12px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3), inset 0 0 20px rgba(212, 175, 55, 0.1);
        }

        .level-text {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .xp-bar-container {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #d4af37;
            border-radius: 8px;
            height: 30px;
            overflow: hidden;
            position: relative;
        }

        .xp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #d4af37, #ffd700);
            transition: width 0.6s ease-out;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            color: #1a0033;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        .xp-text {
            font-size: 0.9rem;
            margin-top: 15px;
            color: #b8a3d1;
        }

        .claim-button {
            font-family: ‘Poppins’, sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 18px 50px;
            background: linear-gradient(135deg, #d4af37, #ffd700);
            color: #1a0033;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4), 0 0 30px rgba(212, 175, 55, 0.2);
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            margin-top: 20px;
        }

        .claim-button:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 8px 30px rgba(212, 175, 55, 0.6), 0 0 50px rgba(212, 175, 55, 0.4);
        }

        .claim-button:active {
            transform: scale(0.98);
        }

        /* Quest Screen */
        .quest-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 30px;
        }

        .quest-page.hidden {
            display: none;
        }

        .quest-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .quest-back-button {
            font-family: ‘Poppins’, sans-serif;
            padding: 10px 20px;
            background: rgba(212, 175, 55, 0.2);
            color: #d4af37;
            border: 2px solid #d4af37;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .quest-back-button:hover {
            background: rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
        }

        .mini-level-display {
            font-size: 0.95rem;
            text-align: center;
        }

        .quest-container {
            perspective: 1200px;
            width: 100%;
            max-width: 600px;
            height: 500px;
            margin: 20px auto;
        }

        .quest-card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s ease-out;
            cursor: pointer;
        }

        .quest-card.flipped {
            transform: rotateY(180deg);
        }

        .quest-card-front,
        .quest-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #d4af37;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(26, 0, 51, 0.95), rgba(13, 0, 26, 0.95));
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.3), inset 0 0 30px rgba(212, 175, 55, 0.1);
            padding: 40px;
        }

        .quest-card-front {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quest-card-front-content {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            color: #d4af37;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .quest-card-back {
            transform: rotateY(180deg);
            flex-direction: column;
            gap: 30px;
        }

        .quest-content {
            display: none;
            width: 100%;
        }

        .quest-content.active {
            display: block;
        }

        .quest-text {
            font-family: ‘Courier Prime’, monospace;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #d4af37;
            text-align: center;
            min-height: 80px;
        }

        .framework-name {
            display: none;
            font-size: 1.3rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffd700;
            margin: 20px 0;
        }

        .framework-name.active {
            display: block;
        }

        .answers-container {
            display: none;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .answers-container.active {
            display: flex;
        }

        .answer-button {
            font-family: ‘Poppins’, sans-serif;
            padding: 15px 20px;
            background: rgba(212, 175, 55, 0.1);
            color: #d4af37;
            border: 2px solid #d4af37;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            text-align: left;
        }

        .answer-button:hover:not(:disabled) {
            background: rgba(212, 175, 55, 0.3);
            transform: translateX(5px);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .answer-button:disabled {
            cursor: not-allowed;
        }

        .answer-button.correct {
            background: rgba(76, 175, 80, 0.4);
            border-color: #4caf50;
            color: #4caf50;
        }

        .answer-button.incorrect {
            background: rgba(244, 67, 54, 0.4);
            border-color: #f44336;
            color: #f44336;
        }

        .feedback {
            display: none;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .feedback.active {
            display: block;
        }

        .feedback.correct {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 2px solid #4caf50;
        }

        .feedback.incorrect {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 2px solid #f44336;
        }

        .explanation {
            display: none;
            font-size: 0.95rem;
            line-height: 1.6;
            background: rgba(212, 175, 55, 0.1);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #d4af37;
            margin-top: 20px;
            text-align: left;
        }

        .explanation.active {
            display: block;
        }

        .next-button {
            display: none;
            font-family: ‘Poppins’, sans-serif;
            padding: 15px 40px;
            background: linear-gradient(135deg, #d4af37, #ffd700);
            color: #1a0033;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            letter-spacing: 1px;
            margin-top: 20px;
        }

        .next-button.active {
            display: block;
        }

        .next-button:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 6px 25px rgba(212, 175, 55, 0.5);
        }

        /* Floating XP Animation */
        .floating-xp {
            position: fixed;
            pointer-events: none;
            font-weight: 700;
            font-size: 2rem;
            color: #4caf50;
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.8);
            animation: float-up 2s ease-out forwards;
        }

        @keyframes float-up {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) scale(1.5);
            }
        }

        /* Animations */
        @keyframes glow-in {
            from {
                opacity: 0;
                text-shadow: 0 0 0 rgba(212, 175, 55, 0);
            }
            to {
                opacity: 1;
                text-shadow: 0 0 20px rgba(212, 175, 55, 0.6), 0 0 40px rgba(212, 175, 55, 0.3);
            }
        }

        @keyframes typewriter {
            from {
                width: 0;
            }
            to {
                width: 100%;
            }
        }

        .typewriter-effect {
            overflow: hidden;
            white-space: pre-wrap;
            animation: typewriter 2s steps(80) forwards;
            display: inline-block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .title-section h1 {
                font-size: 2.5rem;
            }

            .title-section p {
                font-size: 1.2rem;
            }

            .level-display {
                padding: 20px;
            }

            .quest-container {
                height: 400px;
            }

            .quest-card-front,
            .quest-card-back {
                padding: 30px 20px;
            }

            .quest-text {
                font-size: 1rem;
            }

            .answer-button {
                padding: 12px 15px;
                font-size: 0.95rem;
            }

            .claim-button {
                font-size: 1.2rem;
                padding: 15px 40px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .title-section h1 {
                font-size: 2rem;
            }

            .level-display {
                padding: 15px;
            }

            .quest-container {
                height: 350px;
            }

            .quest-card-front,
            .quest-card-back {
                padding: 20px 15px;
            }

            .quest-text {
                font-size: 0.95rem;
                min-height: 60px;
            }
        }
    </style>
</head>
<body>
    <!-- Landing Page -->
    <div class="landing-page" id="landingPage">
        <div class="title-section">
            <h1>THE HUMAN STACK</h1>
            <p>AI is leveling up. So are you.</p>
        </div>

        <div class="level-display">
            <div class="level-text">
                Level <span id="displayLevel">1</span>
            </div>
            <div class="xp-bar-container">
                <div class="xp-bar-fill" id="xpBarFill" style="width: 0%">
                    <span id="xpBarText"></span>
                </div>
            </div>
            <div class="xp-text">
                <span id="displayXP">0</span>/500 XP
            </div>
        </div>

        <button class="claim-button" id="claimButton">Claim Daily Quest</button>
    </div>

    <!-- Quest Page -->
    <div class="quest-page hidden" id="questPage">
        <div class="quest-header">
            <button class="quest-back-button" id="backButton">← Back to Menu</button>
            <div class="mini-level-display">
                Level <span id="questLevel">1</span> • <span id="questXP">0</span>/500 XP
            </div>
        </div>

        <div class="quest-container">
            <div class="quest-card" id="questCard">
                <div class="quest-card-front">
                    <div class="quest-card-front-content">Click to Reveal Quest</div>
                </div>
                <div class="quest-card-back">
                    <div class="quest-text" id="questText"></div>
                    <div class="framework-name" id="frameworkName"></div>
                    <div class="answers-container" id="answersContainer"></div>
                    <div class="feedback" id="feedback"></div>
                    <div class="explanation" id="explanation"></div>
                    <button class="next-button" id="nextButton">Next Quest</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Quest Data - All 43 frameworks
        const questData = [
            {

            },
            {
                name: "Second-Order Thinking",

            },
            {

                correct: 0,
                explanation: "This Zen parable teaches emotional resilience by separating the action from the actor."
            },
            {
                name: "Cobra Effect",
                description: "Solutions that backfire because they incentivize the wrong behavior",
                answers: ["Perverse incentives create problems", "All solutions work perfectly", "Incentives never matter"],
                correct: 0,
                explanation: "Named after a failed British attempt to reduce cobra population in India by paying for dead cobras—people started breeding them instead."
            },
            {
                name: "Goodhart’s Law",
                description: "When a measure becomes a target, it ceases to be a good measure",
                answers: ["Metrics become corrupted when used as goals", "Metrics are always reliable", "Goals and metrics are the same"],
                correct: 0,
                explanation: "Once you optimize for a metric, people game it, making it useless as a true measure of what matters."
            },
            {
                name: "Decision Journal",

            {

            {

                explanation: "By working backwards from failure, you uncover risks you’d miss in traditional planning."
            },
            {
                name: "Five Whys",

                explanation: "Each ‘why’ peels back a layer of symptoms to reveal underlying causes."
            },
            {

                description: "Share 3 things you did well, 1 thing to improve, and 1 thing learned",

                explanation: "This coaching technique creates psychological safety while driving improvement through thoughtful reflection."
            },
            {

                description: "Driver, Approver, Contributor, Informed—clarify decision roles",

            {

        // Game State
        let gameState = {
            level: 1,
            xp: 0,
            completedQuests: [],
            totalXP: 0
        };

        const XP_PER_LEVEL = 500;

        // Initialize
        function init() {
            loadGameState();
            updateUI();
            setupEventListeners();
        }

        // Event Listeners
        function setupEventListeners() {
            document.getElementById(‘claimButton’).addEventListener(‘click’, startQuest);
            document.getElementById(‘backButton’).addEventListener(‘click’, backToMenu);
            document.getElementById(‘questCard’).addEventListener(‘click’, revealQuest);
            document.getElementById(‘nextButton’).addEventListener(‘click’, nextQuest);
        }

        // Load/Save Game State
        function loadGameState() {
            const saved = localStorage.getItem(‘humanStackGameState’);
            if (saved) {
                gameState = JSON.parse(saved);
            }
        }

        function saveGameState() {
            localStorage.setItem(‘humanStackGameState’, JSON.stringify(gameState));
        }

        // UI Updates
        function updateUI() {
            document.getElementById(‘displayLevel’).textContent = gameState.level;
            document.getElementById(‘displayXP’).textContent = gameState.xp;
            document.getElementById(‘questLevel’).textContent = gameState.level;
            document.getElementById(‘questXP’).textContent = gameState.xp;

            const xpPercentage = (gameState.xp / XP_PER_LEVEL) * 100;
            const xpBarFill = document.getElementById(‘xpBarFill’);
            xpBarFill.style.width = xpPercentage + ‘%’;
            xpBarFill.querySelector(‘#xpBarText’).textContent = `${gameState.xp}/${XP_PER_LEVEL}`;
        }

        // Start Quest
        function startQuest() {
            document.getElementById(‘landingPage’).classList.add(‘hidden’);
            document.getElementById(‘questPage’).classList.remove(‘hidden’);
            resetQuestCard();
        }

        // Back to Menu
        function backToMenu() {
            document.getElementById(‘questPage’).classList.add(‘hidden’);
            document.getElementById(‘landingPage’).classList.remove(‘hidden’);
            resetQuestCard();
        }

        // Get Random Quest
        function getRandomQuest() {
            const randomIndex = Math.floor(Math.random() * questData.length);
            return questData[randomIndex];
        }

        // Reset Quest Card
        function resetQuestCard() {
            const card = document.getElementById(‘questCard’);
            card.classList.remove(‘flipped’);

            const questContent = document.querySelector(‘.quest-content’);
            if (questContent) questContent.remove();

            document.getElementById(‘questText’).textContent = ‘’;
            document.getElementById(‘frameworkName’).classList.remove(‘active’);
            document.getElementById(‘answersContainer’).classList.remove(‘active’);
            document.getElementById(‘answersContainer’).innerHTML = ‘’;
            document.getElementById(‘feedback’).classList.remove(‘active’);
            document.getElementById(‘explanation’).classList.remove(‘active’);
            document.getElementById(‘nextButton’).classList.remove(‘active’);
        }

        // Reveal Quest
        function revealQuest() {
            const card = document.getElementById(‘questCard’);
            if (!card.classList.contains(‘flipped’)) {
                card.classList.add(‘flipped’);
                displayQuestContent();
            }
        }

        // Display Quest Content
        function displayQuestContent() {
            const currentQuest = window.currentQuest || getRandomQuest();
            window.currentQuest = currentQuest;

            const questTextEl = document.getElementById(‘questText’);
            questTextEl.innerHTML = ‘’;

            // Typewriter effect
            const typewriterSpan = document.createElement(‘span’);
            typewriterSpan.className = ‘typewriter-effect’;
            typewriterSpan.textContent = currentQuest.description;
            questTextEl.appendChild(typewriterSpan);

            // Framework name appears after typewriter
            setTimeout(() => {
                const frameworkNameEl = document.getElementById(‘frameworkName’);
                frameworkNameEl.textContent = currentQuest.name;
                frameworkNameEl.classList.add(‘active’);

                // Answers appear after framework name
                setTimeout(() => {
                    displayAnswers(currentQuest);
                }, 500);
            }, 2200);
        }

        // Display Answers
        function displayAnswers(quest) {
            const container = document.getElementById(‘answersContainer’);
            container.innerHTML = ‘’;
            container.classList.add(‘active’);

            quest.answers.forEach((answer, index) => {
                const button = document.createElement(‘button’);
                button.className = ‘answer-button’;
                button.textContent = answer;
                button.onclick = () => selectAnswer(index, quest);
                button.disabled = window.answerSelected;
                container.appendChild(button);
            });
        }

        // Select Answer
        function selectAnswer(selectedIndex, quest) {
            window.answerSelected = true;
            const buttons = document.querySelectorAll(‘.answer-button’);
            const isCorrect = selectedIndex === quest.correct;

            buttons.forEach((btn, index) => {
                btn.disabled = true;
                if (index === quest.correct) {
                    btn.classList.add(‘correct’);
                } else if (index === selectedIndex && !isCorrect) {
                    btn.classList.add(‘incorrect’);
                }
            });

            // Show feedback
            const feedbackEl = document.getElementById(‘feedback’);
            feedbackEl.classList.add(‘active’);
            if (isCorrect) {
                feedbackEl.classList.add(‘correct’);
                feedbackEl.classList.remove(‘incorrect’);
                feedbackEl.textContent = ‘✓ Correct!’;
                addXP(50);
                createFloatingXP(event);
            } else {
                feedbackEl.classList.add(‘incorrect’);
                feedbackEl.classList.remove(‘correct’);
                feedbackEl.textContent = ‘✗ Incorrect’;
            }

            // Show explanation
            setTimeout(() => {
                const explanationEl = document.getElementById(‘explanation’);
                explanationEl.textContent = quest.explanation;
                explanationEl.classList.add(‘active’);

                // Show next button
                setTimeout(() => {
                    document.getElementById(‘nextButton’).classList.add(‘active’);
                }, 500);
            }, 1500);
        }

        // Add XP
        function addXP(amount) {
            gameState.xp += amount;
            gameState.totalXP += amount;

            while (gameState.xp >= XP_PER_LEVEL) {
                gameState.xp -= XP_PER_LEVEL;
                gameState.level++;
            }

            updateUI();
            saveGameState();
        }

        // Create Floating XP
        function createFloatingXP(event) {
            const floatingXP = document.createElement(‘div’);
            floatingXP.className = ‘floating-xp’;
            floatingXP.textContent = ‘+50 XP’;

            const rect = document.getElementById(‘questCard’).getBoundingClientRect();
            floatingXP.style.left = rect.left + rect.width / 2 + ‘px’;
            floatingXP.style.top = rect.top + rect.height / 2 + ‘px’;

            document.body.appendChild(floatingXP);

            setTimeout(() => floatingXP.remove(), 2000);
        }

        // Next Quest
        function nextQuest() {
            window.answerSelected = false;
            window.currentQuest = null;
            resetQuestCard();
        }

        // Start the app
        init();
    </script>
