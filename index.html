<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Shrine of Knowledge</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at top, #3f2a6b 0%, #201433 45%, #0b1128 100%);
        color: #f3e8ff;
      }

      .landing {
        width: min(90vw, 620px);
        text-align: center;
        padding: 3rem 2rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 3rem);
        letter-spacing: 0.02em;
      }

      .subtitle {
        margin: 0.85rem 0 2rem;
        font-size: clamp(1rem, 2.3vw, 1.2rem);
        color: #d8c7ff;
      }

      .blessing-button {
        padding: 0.85rem 1.8rem;
        border: 1px solid #aa9bf7;
        border-radius: 999px;
        background: linear-gradient(135deg, #7050c7, #4d75d8);
        color: #f9f5ff;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
      }

      .reveal {
        margin-top: 1.5rem;
        min-height: 2.5rem;
      }
    </style>
  </head>
  <body>
    <main class="landing">
      <h1>The Shrine of Knowledge</h1>
      <p class="subtitle">Seek your wisdom blessing</p>
      <button class="blessing-button" type="button">Receive Blessing</button>
      <div class="reveal" aria-live="polite"></div>
    </main>
  </body>
</html>
