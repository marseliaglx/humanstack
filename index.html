<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Shrine of Knowledge</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background:
          radial-gradient(circle at 50% 22%, rgba(194, 122, 255, 0.35) 0%, rgba(255, 152, 94, 0.23) 20%, rgba(36, 20, 54, 0.7) 44%, #06060c 84%);
        color: #f3e8ff;
        position: relative;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(circle at center, rgba(194, 122, 255, 0.15), transparent 62%);
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(135deg, rgba(155, 98, 255, 0.1), rgba(255, 158, 96, 0.08));
      }

      .landing {
        width: min(95vw, 900px);
        text-align: center;
        padding: 3rem 2rem;
        position: relative;
        animation: pageFadeIn 220ms ease-out both;
      }

      .landing::before {
        content: "";
        position: absolute;
        inset: 8% 9%;
        border-radius: 30px;
        background: radial-gradient(circle at center, rgba(188, 118, 255, 0.28), rgba(252, 155, 105, 0.16) 35%, transparent 72%);
        filter: blur(48px);
        z-index: -1;
        pointer-events: none;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 3rem);
        letter-spacing: 0.02em;
      }

      .subtitle {
        margin: 0.85rem 0 2rem;
        font-size: clamp(1rem, 2.3vw, 1.2rem);
        color: #d8c7ff;
      }

      .blessing-button {
        padding: 0.85rem 1.8rem;
        border: 1px solid #c5b3ff;
        border-radius: 999px;
        background: linear-gradient(135deg, #7050c7, #4d75d8);
        color: #f9f5ff;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 180ms ease, box-shadow 220ms ease, filter 220ms ease;
        box-shadow: 0 0 0 rgba(142, 116, 255, 0);
      }

      .blessing-button:hover {
        transform: translateY(-2px);
        filter: brightness(1.07);
        box-shadow: 0 0 20px rgba(169, 136, 255, 0.65), 0 0 34px rgba(91, 149, 255, 0.35);
      }

      .blessing-button:active {
        transform: translateY(0);
      }

      .blessing-button:disabled {
        cursor: wait;
        opacity: 0.88;
        transform: none;
        filter: saturate(0.9);
      }

      .discovery-count {
        margin-top: 0.85rem;
        font-size: 0.86rem;
        color: #cbb8f4;
      }

      .blessing-card {
        --rarity-color: #9a9aa4;
        --rarity-border: rgba(154, 154, 164, 0.5);
        --rarity-glow: rgba(154, 154, 164, 0.22);
        position: relative;
        border-radius: 14px;
        padding: 1.2rem;
        text-align: left;
        background: rgba(18, 13, 31, 0.64);
        border: 1px solid color-mix(in srgb, var(--rarity-border) 58%, transparent);
        box-shadow: 0 10px 24px color-mix(in srgb, var(--rarity-glow) 68%, transparent);
        backdrop-filter: blur(2px);
        transition: box-shadow 170ms ease, transform 170ms ease, border-color 170ms ease;
      }

      .blessing-card:hover {
        transform: translateY(-1px);
        border-color: color-mix(in srgb, var(--rarity-color) 72%, #fff 28%);
        box-shadow: 0 0 20px color-mix(in srgb, var(--rarity-glow) 88%, #fff 12%),
          inset 0 0 0 1px color-mix(in srgb, var(--rarity-color) 46%, transparent);
      }

      .blessing-card::before {
        content: "";
        position: absolute;
        inset: -20px -16px;
        border-radius: inherit;
        background: radial-gradient(circle at 50% 45%, color-mix(in srgb, var(--rarity-color) 20%, transparent), transparent 70%);
        filter: blur(22px);
        pointer-events: none;
        z-index: -1;
      }

      .blessing-card h2 {
        margin: 0;
        color: var(--rarity-color);
        font-size: 1.15rem;
      }

      .blessing-card p {
        margin: 0.55rem 0 0;
        color: #e1d8ff;
        line-height: 1.45;
      }

      .framework-view {
        margin-top: 0.8rem;
        text-align: left;
      }

      .framework-panel {
        padding: 1.4rem;
        border-radius: 16px;
      }

      .framework-reading {
        max-width: 66ch;
      }

      .framework-top {
        display: grid;
        grid-template-columns: minmax(230px, 320px) minmax(0, 1fr);
        gap: 1.2rem;
        align-items: start;
      }

      .framework-image {
        min-height: 170px;
        border-radius: 12px;
        border: 1px solid color-mix(in srgb, var(--rarity-color) 25%, transparent);
        background: linear-gradient(140deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.01));
        display: grid;
        place-items: center;
        color: #e4d7ff;
        letter-spacing: 0.03em;
        font-size: 0.88rem;
      }

      .framework-name {
        margin: 0.9rem 0 0;
        font-size: 1.2rem;
      }

      .mini-stats {
        margin-top: 0.72rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
      }

      .mini-stats span {
        font-size: 0.74rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: #e6dcff;
        border: 1px solid rgba(228, 208, 255, 0.34);
        padding: 0.32rem 0.5rem;
        border-radius: 999px;
        background: rgba(20, 14, 36, 0.62);
      }

      .framework-title {
        margin: 0.35rem 0 0;
        font-size: clamp(1.55rem, 3.8vw, 2.2rem);
      }

      .framework-tagline {
        margin-top: 0.55rem;
        font-size: 1rem;
        color: #e6dcff;
      }

      .framework-section {
        margin-top: 1.6rem;
        padding-top: 1.3rem;
        border-top: 1px solid color-mix(in srgb, var(--rarity-color) 24%, transparent);
      }

      .framework-section h4 {
        margin: 0;
        font-size: 0.92rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: color-mix(in srgb, var(--rarity-color) 82%, #fff 18%);
      }

      .framework-section p {
        margin-top: 0.6rem;
        color: #f1e9ff;
        line-height: 1.72;
      }

      .explanation-grid {
        margin-top: 0.9rem;
        display: grid;
        gap: 1rem;
      }

      .explanation-block {
        padding: 1rem;
        border-radius: 12px;
        border: 1px solid color-mix(in srgb, var(--rarity-color) 26%, transparent);
        background: rgba(17, 12, 31, 0.58);
      }

      .explanation-block h5 {
        margin: 0;
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: color-mix(in srgb, var(--rarity-color) 84%, #fff 16%);
      }

      .explanation-block p,
      .explanation-block ul {
        margin: 0.6rem 0 0;
      }

      .visual-flow {
        margin-top: 0.8rem;
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 0.45rem;
        align-items: center;
      }

      .flow-step {
        grid-column: span 1;
        padding: 0.7rem 0.45rem;
        border-radius: 10px;
        border: 1px solid color-mix(in srgb, var(--rarity-color) 28%, transparent);
        background: rgba(255, 255, 255, 0.04);
        text-align: center;
        font-size: 0.82rem;
        line-height: 1.3;
      }

      .flow-arrow {
        text-align: center;
        color: color-mix(in srgb, var(--rarity-color) 78%, #fff 22%);
        font-size: 1rem;
      }

      .before-after {
        margin-top: 0.7rem;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.7rem;
      }

      .example-side {
        padding: 0.75rem;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.03);
      }

      .example-side strong {
        display: block;
        font-size: 0.78rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .example-side p {
        margin: 0.42rem 0 0;
        font-size: 0.9rem;
      }

      .try-now-list {
        padding-left: 1.1rem;
      }

      .try-now-list li + li {
        margin-top: 0.45rem;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 16px;
        backdrop-filter: blur(10px);
        box-shadow: 0 14px 36px rgba(86, 40, 140, 0.22);
      }

      .stats-container {
        margin-top: 0.8rem;
        padding: 1rem;
      }

      .stat-row {
        margin-top: 0.9rem;
      }

      .stat-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 0.75rem;
      }

      .stat-label {
        font-size: 0.75rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(231, 220, 255, 0.68);
      }

      .stat-value {
        font-size: 0.86rem;
        color: #f3ecff;
        font-variant-numeric: tabular-nums;
      }

      .bar {
        margin-top: 0.46rem;
        width: 100%;
        height: 10px;
        border-radius: 999px;
        background: rgba(10, 8, 17, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }

      .bar i {
        display: block;
        height: 100%;
        width: 0;
        border-radius: inherit;
        background: linear-gradient(90deg, color-mix(in srgb, var(--rarity-color) 70%, #b39cff 30%), var(--rarity-color));
        transition: width 240ms ease-out;
      }

      .blessing-enter .bar i {
        width: var(--target-width, 0%);
      }

      .detail-box-grid {
        margin-top: 0.95rem;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.85rem;
      }

      .detail-box {
        padding: 0.85rem 0.95rem;
        border-radius: 12px;
        border: 1px solid color-mix(in srgb, var(--rarity-color) 26%, transparent);
        background: rgba(17, 12, 31, 0.58);
      }

      .detail-box.glass-card {
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.05);
      }

      .detail-box h5 {
        margin: 0;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: color-mix(in srgb, var(--rarity-color) 84%, #fff 16%);
      }

      .detail-box p {
        margin: 0.5rem 0 0;
        font-size: 0.92rem;
        color: #efe6ff;
        line-height: 1.62;
      }

      .action-list {
        margin: 0.72rem 0 0;
        padding-left: 1.1rem;
        display: grid;
        gap: 0.52rem;
      }

      .action-list li {
        color: #f1e9ff;
        line-height: 1.6;
      }

      .paragraph-stack {
        display: grid;
        gap: 0.7rem;
        margin-top: 0.68rem;
      }

      .paragraph-stack p {
        margin: 0;
      }

      .secondary-section {
        opacity: 0.86;
      }

      .flavor-text {
        margin-top: 1.9rem;
        padding-top: 1.2rem;
        border-top: 1px solid color-mix(in srgb, var(--rarity-color) 18%, transparent);
        opacity: 0.74;
      }

      .flavor-text h5 {
        margin: 0;
        font-size: 0.74rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: color-mix(in srgb, var(--rarity-color) 68%, #fff 32%);
      }

      .flavor-text p {
        margin-top: 0.44rem;
        color: #dacdf4;
        line-height: 1.58;
      }

      .back-button {
        margin-top: 1.3rem;
        width: 100%;
      }

      .action-row {
        margin-top: 1rem;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }

      @media print {
        :root {
          color-scheme: light;
        }

        body {
          background: #fff;
          color: #000;
          display: block;
          min-height: auto;
          padding: 0;
          margin: 0;
          font-size: 12pt;
        }

        .landing {
          width: 100%;
          max-width: none;
          padding: 0;
        }

        .blessing-card,
        .framework-image,
        .detail-box {
          background: #fff;
          border: 1px solid #111;
          color: #000;
          box-shadow: none;
          backdrop-filter: none;
        }

        .blessing-card::before,
        .bar,
        .bar i {
          display: none;
        }

        .framework-title,
        .framework-name,
        .framework-tagline,
        .framework-section h4,
        .framework-section p,
        .detail-box h5,
        .detail-box p,
        .mini-stats span,
        .rarity-label,
        .stat-label,
        .stat-value {
          color: #000;
        }

        .framework-top,
        .detail-box-grid {
          gap: 0.6rem;
        }

        .framework-section {
          margin-top: 0.8rem;
          padding-top: 0.8rem;
          border-top: 1px solid #111;
        }

        .mini-stats span {
          background: #fff;
          border-color: #111;
        }

        .stat-row {
          grid-template-columns: 1fr;
          gap: 0.3rem;
          margin-top: 0.45rem;
        }

        .no-print,
        #shrineShell {
          display: none !important;
        }
      }

      @media (max-width: 780px) {
        .landing {
          padding: 2rem 1rem;
        }

        .framework-top {
          grid-template-columns: 1fr;
        }

        .visual-flow {
          grid-template-columns: 1fr;
        }

        .flow-step,
        .flow-arrow {
          grid-column: auto;
        }

        .detail-box-grid {
          grid-template-columns: 1fr;
        }

        .before-after {
          grid-template-columns: 1fr;
        }
      }

      .rarity-label {
        margin-top: 0.5rem;
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: color-mix(in srgb, var(--rarity-color) 85%, #fff 15%);
      }

      .rarity-common {
        --rarity-color: #b4bac8;
        --rarity-border: rgba(164, 172, 187, 0.55);
        --rarity-glow: rgba(146, 152, 165, 0.2);
      }

      .rarity-rare {
        --rarity-color: #7ea7ff;
        --rarity-border: rgba(126, 167, 255, 0.62);
        --rarity-glow: rgba(96, 146, 255, 0.24);
      }

      .rarity-epic {
        --rarity-color: #be8dff;
        --rarity-border: rgba(190, 141, 255, 0.66);
        --rarity-glow: rgba(188, 117, 255, 0.32);
      }

      .rarity-legendary {
        --rarity-color: #f1cc6a;
        --rarity-border: rgba(241, 204, 106, 0.75);
        --rarity-glow: rgba(251, 218, 113, 0.44);
        box-shadow: 0 0 26px rgba(251, 218, 113, 0.36),
          0 0 42px rgba(251, 186, 77, 0.2),
          inset 0 0 0 1px rgba(241, 204, 106, 0.44);
      }

      .blessing-enter {
        animation: blessingFade 450ms ease;
      }

      .rarity-epic.blessing-enter {
        animation: blessingFade 450ms ease, epicPulse 2.4s ease-in-out infinite;
      }

      @keyframes epicPulse {
        0%,
        100% {
          box-shadow: 0 0 15px rgba(188, 117, 255, 0.24),
            inset 0 0 0 1px rgba(190, 141, 255, 0.34);
        }
        50% {
          box-shadow: 0 0 24px rgba(188, 117, 255, 0.38),
            inset 0 0 0 1px rgba(190, 141, 255, 0.5);
        }
      }

      @keyframes blessingFade {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes pageFadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <main class="landing">
      <button class="blessing-button no-print" id="blessBtn" type="button">Receive Today’s Blessing</button>
      <section id="shrineShell">
        <h1>The Shrine of Knowledge</h1>
        <p class="subtitle">Seek your wisdom blessing</p>
        <p class="discovery-count" id="discoveryCount" aria-live="polite"></p>
      </section>
      <section class="framework-view" id="frameworkView" aria-live="polite" hidden></section>
    </main>

    <script>
      const UI_TEXT = {
        loading: "Loading frameworks...",
        loadError: "Could not load frameworks.",
        idleButton: "Receive Today’s Blessing",
        loadingButton: "Channeling wisdom...",
        ready: "Today's blessing is waiting. Enter when ready.",
      };

      const STORAGE_KEY = "dailyBlessing";
      const TRY_TODAY_BY_ID = {
        inversion: "List 3 ways your current project could fail.",
        "second-order-thinking": "Write 1 likely consequence at 30, 90, and 365 days.",
        "five-whys": "Pick one issue and ask why five times using evidence only.",
        kaizen: "Improve one recurring step today and measure the before/after.",
        "swipe-file": "Study 3 examples and adapt one pattern into your draft.",
        "first-principles": "Challenge one assumption and restate the problem from facts.",
        "pareto-principle": "Rank tasks by impact and delete one low-yield task today.",
        "ooda-loop": "Run one quick Observe→Orient→Decide→Act cycle before lunch.",
        "jobs-to-be-done": "Ask one user what progress they were trying to make.",
        premortem: "Name the top 3 risks and assign one owner to each.",
      };

      const state = {
        frameworks: [],
        todaysBlessingId: null,
      };

      const elements = {
        button: document.getElementById("blessBtn"),
        shrineShell: document.getElementById("shrineShell"),
        frameworkView: document.getElementById("frameworkView"),
        discoveryCount: document.getElementById("discoveryCount"),
      };

      const toDateString = (date) => date.toISOString().slice(0, 10);
      const getTodayString = () => toDateString(new Date());

      function getYesterdayString(todayString) {
        const yesterday = new Date(`${todayString}T00:00:00`);
        yesterday.setDate(yesterday.getDate() - 1);
        return toDateString(yesterday);
      }

      function readSavedBlessing() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return {};

        try {
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === "object" ? parsed : {};
        } catch {
          return {};
        }
      }

      function saveBlessing(blessing) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(blessing));
      }

      function setStatus(message) {
        elements.discoveryCount.textContent = message;
      }

      function hideBlessingButton() {
        elements.button.hidden = true;
      }

      function showView({ detail }) {
        elements.frameworkView.hidden = !detail;
        elements.shrineShell.hidden = detail;
      }

      function pickFramework(excludedId = null) {
        const candidates =
          excludedId && state.frameworks.length > 1
            ? state.frameworks.filter((framework) => framework.id !== excludedId)
            : state.frameworks;

        if (candidates.length === 0) return null;
        return candidates[Math.floor(Math.random() * candidates.length)];
      }

      function getTryThisToday(framework) {
        if (framework?.id && TRY_TODAY_BY_ID[framework.id]) {
          return TRY_TODAY_BY_ID[framework.id];
        }

        return "Pick one decision today and write the next concrete action in one sentence.";
      }

      function getWhatThisHelpsYouDo(framework) {
        return `Use ${framework.name} to turn unclear decisions into clear next actions with less wasted effort.`;
      }

      function getRealExample(framework) {
        return {
          before: `Before ${framework.name}: We jump into execution with assumptions and fix mistakes late.`,
          after: `After ${framework.name}: We break the problem down first, validate the core truth, and execute with fewer surprises.`,
        };
      }

      function getTryThisNowSteps(framework) {
        return [
          `Pick one current challenge and define the exact problem in one sentence.`,
          `Break it into parts and identify the core truth that must be true for success.`,
          `Rebuild your next action plan using that core truth and test it today with one small step.`,
        ];
      }

      function bindDetailActions() {
        const backButton = document.getElementById("backToShrine");
        const saveAsPdfButton = document.getElementById("saveAsPdf");

        backButton?.addEventListener("click", () => showView({ detail: false }));
        saveAsPdfButton?.addEventListener("click", () => window.print());
      }

      function renderBlessing(framework) {
        const rarityClass = `rarity-${(framework.rarity || "Common").toLowerCase()}`;
        const stats = framework.stats || {};
        const adaptability = Number(stats.adaptability || 0);
        const logic = Number(stats.logic || 0);
        const efficiency = Number(stats.efficiency || 0);

        showView({ detail: true });
        const applicationText = framework.application || "Use this framework on your next important choice to stay focused and practical.";
        const descriptionText = framework.description || "This framework gives you a structured way to reason about choices and move forward faster.";
        const mechanicsText = framework.mechanics || framework.description || "No detailed mechanics provided.";
        const flavorText = framework.flavor || "\"Wisdom sharpens where reflection meets action.\"";
        const howItWorksSentences = splitSentences(`${descriptionText} ${mechanicsText}`).slice(0, 3);
        const howItWorks = howItWorksSentences.length > 0 ? howItWorksSentences.join(" ") : descriptionText;
        const applyStep = splitSentences(applicationText)[0] || applicationText;
        const tryTodayStep = getTryThisToday(framework);

        elements.frameworkView.innerHTML = `
          <article class="blessing-card blessing-enter framework-panel ${rarityClass}">
            <div class="framework-top">
              <div class="framework-left">
                <div class="framework-image" role="img" aria-label="${framework.name} visual placeholder">
                  Visual Placeholder
                </div>
                <h3 class="framework-name">${framework.name}</h3>
                <div class="mini-stats">
                  <span>${framework.category || "General"}</span>
                  <span>ADP ${adaptability}</span>
                  <span>LOG ${logic}</span>
                  <span>EFF ${efficiency}</span>
                </div>
              </div>
              <div class="framework-right">
                <p class="rarity-label">${framework.rarity || "Common"}</p>
                <h2 class="framework-title">${framework.name}</h2>
                <p class="framework-tagline">${framework.tagline || "A framework for better decisions and execution."}</p>
              </div>
            </div>

            <section class="framework-section">
              <h4>What this helps you do</h4>
              <div class="explanation-grid">
                <article class="explanation-block">
                  <p>${getWhatThisHelpsYouDo(framework)}</p>
                </article>

                <article class="explanation-block">
                  <h5>Visual Explanation</h5>
                  <div class="visual-flow" role="img" aria-label="Problem to rebuild flow">
                    <div class="flow-step">Problem</div>
                    <div class="flow-arrow" aria-hidden="true">→</div>
                    <div class="flow-step">Break down</div>
                    <div class="flow-arrow" aria-hidden="true">→</div>
                    <div class="flow-step">Core truth</div>
                    <div class="flow-arrow" aria-hidden="true">→</div>
                    <div class="flow-step">Rebuild</div>
                  </div>
                </article>

                <article class="explanation-block">
                  <h5>Real Example</h5>
                  <div class="before-after">
                    <div class="example-side">
                      <strong>Before</strong>
                      <p>${getRealExample(framework).before}</p>
                    </div>
                    <div class="example-side">
                      <strong>After</strong>
                      <p>${getRealExample(framework).after}</p>
                    </div>
                  </div>
                </article>

                <article class="explanation-block">
                  <h5>Try This Now</h5>
                  <ul class="try-now-list">
                    ${getTryThisNowSteps(framework)
                      .map((step) => `<li>${step}</li>`)
                      .join("")}
                  </ul>
                </article>
              </div>
            </section>

            <section class="framework-section">
              <h4>Innate Ability</h4>
              <p>${framework.application || "No application guidance available yet."}</p>
            </section>

            <section class="framework-section">
              <h4>Stats</h4>
              <div class="stats-container glass-card">
                <div class="stat-row">
                  <span>Adaptability</span>
                  <div class="bar"><i style="--target-width: ${adaptability}%"></i></div>
                </div>
                <div class="stat-row">
                  <span>Logic Flow</span>
                  <div class="bar"><i style="--target-width: ${logic}%"></i></div>
                </div>
                <div class="stat-row">
                  <span>Efficiency</span>
                  <div class="bar"><i style="--target-width: ${efficiency}%"></i></div>
                </div>
              </section>

              <div class="flavor-text">
                <h5>Flavor Text</h5>
                <p>${flavorText}</p>
              </div>
            </div>

            <div class="action-row no-print">
              <button class="back-button" id="backToShrine" type="button">Back to Shrine</button>
              <button class="back-button" id="saveAsPdf" type="button">Save as PDF</button>
            </div>
          </article>
        `;

        bindDetailActions();
      }

      async function loadFrameworks() {
        elements.button.disabled = true;
        setStatus(UI_TEXT.loading);

        try {
          const response = await fetch("./frameworks.json");
          state.frameworks = await response.json();

          const blessing = readSavedBlessing();
          const today = getTodayString();
          if (blessing.date === today) {
            state.todaysBlessingId = blessing.id;
            const todaysFramework = state.frameworks.find((item) => item.id === state.todaysBlessingId);
            if (todaysFramework) {
              renderBlessing(todaysFramework);
              hideBlessingButton();
            }
            setStatus(UI_TEXT.ready);
          } else {
            setStatus("");
          }

          elements.button.disabled = false;
        } catch {
          setStatus(UI_TEXT.loadError);
        }
      }

      function resolveTodaysBlessing() {
        const savedToday = state.frameworks.find((item) => item.id === state.todaysBlessingId);
        if (savedToday) return savedToday;

        const previous = readSavedBlessing();
        const today = getTodayString();
        const yesterday = getYesterdayString(today);
        const excludedId = previous.date === yesterday ? previous.id : null;
        const framework = pickFramework(excludedId);

        if (!framework) return null;

        state.todaysBlessingId = framework.id;
        saveBlessing({ id: framework.id, date: today });
        return framework;
      }

      async function onBlessClick() {
        if (state.frameworks.length === 0 || elements.button.disabled) return;

        elements.button.disabled = true;
        elements.button.textContent = UI_TEXT.loadingButton;

        const framework = resolveTodaysBlessing();
        if (framework) {
          renderBlessing(framework);
          hideBlessingButton();
          setStatus(UI_TEXT.ready);
        }

        await new Promise((resolve) => setTimeout(resolve, 420));
        elements.button.textContent = UI_TEXT.idleButton;
        elements.button.disabled = false;
      }

      elements.button.addEventListener("click", onBlessClick);
      loadFrameworks();
    </script>
  </body>
</html>
