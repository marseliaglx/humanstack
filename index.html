<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Shrine of Knowledge</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at top, #3f2a6b 0%, #201433 45%, #0b1128 100%);
        color: #f3e8ff;
      }

      .landing {
        width: min(92vw, 640px);
        text-align: center;
        padding: 3rem 2rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 3rem);
        letter-spacing: 0.02em;
      }

      .subtitle {
        margin: 0.85rem 0 2rem;
        font-size: clamp(1rem, 2.3vw, 1.2rem);
        color: #d8c7ff;
      }

      .blessing-button {
        padding: 0.85rem 1.8rem;
        border: 1px solid #c5b3ff;
        border-radius: 999px;
        background: linear-gradient(135deg, #7050c7, #4d75d8);
        color: #f9f5ff;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 180ms ease, box-shadow 220ms ease, filter 220ms ease;
        box-shadow: 0 0 0 rgba(142, 116, 255, 0);
      }

      .blessing-button:hover {
        transform: translateY(-2px);
        filter: brightness(1.07);
        box-shadow: 0 0 20px rgba(169, 136, 255, 0.65), 0 0 34px rgba(91, 149, 255, 0.35);
      }

      .blessing-button:active {
        transform: translateY(0);
      }

      .reveal {
        margin-top: 1.5rem;
        min-height: 7.5rem;
      }

      .discovery-count {
        margin-top: 0.85rem;
        font-size: 0.86rem;
        color: #cbb8f4;
      }

      .blessing-card {
        --rarity-color: #9a9aa4;
        --rarity-border: rgba(154, 154, 164, 0.5);
        --rarity-glow: rgba(154, 154, 164, 0.22);
        position: relative;
        border-radius: 14px;
        padding: 1.2rem;
        text-align: left;
        background: rgba(18, 13, 31, 0.64);
        border: 1px solid var(--rarity-border);
        box-shadow: 0 0 16px var(--rarity-glow), inset 0 0 0 1px color-mix(in srgb, var(--rarity-color) 38%, transparent);
        backdrop-filter: blur(2px);
      }

      .blessing-card::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        border: 1px solid color-mix(in srgb, var(--rarity-color) 58%, transparent);
        pointer-events: none;
      }

      .blessing-card h2 {
        margin: 0;
        color: var(--rarity-color);
        font-size: 1.15rem;
      }

      .blessing-card p {
        margin: 0.55rem 0 0;
        color: #e1d8ff;
        line-height: 1.45;
      }

      .rarity-label {
        margin-top: 0.5rem;
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: color-mix(in srgb, var(--rarity-color) 85%, #fff 15%);
      }

      .rarity-common {
        --rarity-color: #b4bac8;
        --rarity-border: rgba(164, 172, 187, 0.55);
        --rarity-glow: rgba(146, 152, 165, 0.2);
      }

      .rarity-rare {
        --rarity-color: #7ea7ff;
        --rarity-border: rgba(126, 167, 255, 0.62);
        --rarity-glow: rgba(96, 146, 255, 0.24);
      }

      .rarity-epic {
        --rarity-color: #be8dff;
        --rarity-border: rgba(190, 141, 255, 0.66);
        --rarity-glow: rgba(188, 117, 255, 0.32);
      }

      .rarity-legendary {
        --rarity-color: #f1cc6a;
        --rarity-border: rgba(241, 204, 106, 0.75);
        --rarity-glow: rgba(251, 218, 113, 0.44);
        box-shadow: 0 0 26px rgba(251, 218, 113, 0.36),
          0 0 42px rgba(251, 186, 77, 0.2),
          inset 0 0 0 1px rgba(241, 204, 106, 0.44);
      }

      .blessing-enter {
        animation: blessingFade 450ms ease;
      }

      .rarity-epic.blessing-enter {
        animation: blessingFade 450ms ease, epicPulse 2.4s ease-in-out infinite;
      }

      @keyframes epicPulse {
        0%,
        100% {
          box-shadow: 0 0 15px rgba(188, 117, 255, 0.24),
            inset 0 0 0 1px rgba(190, 141, 255, 0.34);
        }
        50% {
          box-shadow: 0 0 24px rgba(188, 117, 255, 0.38),
            inset 0 0 0 1px rgba(190, 141, 255, 0.5);
        }
      }

      @keyframes blessingFade {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <main class="landing">
      <h1>The Shrine of Knowledge</h1>
      <p class="subtitle">Seek your wisdom blessing</p>
      <button class="blessing-button" id="blessBtn" type="button">Receive Blessing</button>
      <p class="discovery-count" id="discoveryCount" aria-live="polite"></p>
      <div class="reveal" id="reveal" aria-live="polite"></div>
    </main>

    <script>
      const button = document.getElementById("blessBtn");
      const reveal = document.getElementById("reveal");
      const discoveryCount = document.getElementById("discoveryCount");
      const discoveredStorageKey = "discoveredFrameworkIds";
      let frameworks = [];

      function readDiscoveredIds() {
        const raw = localStorage.getItem(discoveredStorageKey);
        if (!raw) return [];

        try {
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      function writeDiscoveredIds(ids) {
        localStorage.setItem(discoveredStorageKey, JSON.stringify(ids));
      }

      function updateDiscoveryText(count, total) {
        discoveryCount.textContent = `You have discovered ${count} / ${total} frameworks`;
      }

      function pickUndiscoveredFramework(discoveredIds) {
        const undiscovered = frameworks.filter((framework) => !discoveredIds.includes(framework.id));
        if (undiscovered.length === 0) return null;
        return undiscovered[Math.floor(Math.random() * undiscovered.length)];
      }

      let discoveredIds = [];

      async function loadFrameworks() {
        button.disabled = true;
        discoveryCount.textContent = "Loading frameworks...";

        try {
          const response = await fetch("./frameworks.json");
          frameworks = await response.json();

          discoveredIds = readDiscoveredIds().filter((id) =>
            frameworks.some((framework) => framework.id === id)
          );

          updateDiscoveryText(discoveredIds.length, frameworks.length);
          button.disabled = false;
        } catch {
          discoveryCount.textContent = "Could not load frameworks.";
        }
      }

      button.addEventListener("click", () => {
        if (frameworks.length === 0) return;

        if (discoveredIds.length === frameworks.length) {
          discoveredIds = [];
        }

        const framework = pickUndiscoveredFramework(discoveredIds);
        if (!framework) {
          return;
        }

        discoveredIds.push(framework.id);
        writeDiscoveredIds(discoveredIds);
        updateDiscoveryText(discoveredIds.length, frameworks.length);
        const rarityClass = `rarity-${(framework.rarity || "Common").toLowerCase()}`;

        reveal.innerHTML = `
          <article class="blessing-card blessing-enter ${rarityClass}">
            <h2>Your Blessing Appears</h2>
            <p>${framework.name} — ${framework.description}</p>
            <p class="rarity-label">${framework.rarity || "Common"}</p>
          </article>
        `;
      });

      loadFrameworks();
    </script>
  </body>
</html>
