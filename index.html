<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Human Stack: Daily Quest</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Playfair+Display:wght@700;900&family=Courier+Prime:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier Prime', monospace;
            background: linear-gradient(135deg, #0a0015 0%, #1a0a2e 50%, #0d001a 100%);
            color: #e0d5b7;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
            position: relative;
        }

        /* Starfield Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(1px 1px at 20% 30%, #fff, transparent),
                radial-gradient(1px 1px at 60% 70%, #fff, transparent),
                radial-gradient(1px 1px at 50% 50%, #fff, transparent),
                radial-gradient(1px 1px at 80% 10%, #fff, transparent),
                radial-gradient(1px 1px at 90% 60%, #fff, transparent),
                radial-gradient(1px 1px at 30% 80%, #fff, transparent);
            background-size: 200% 200%;
            pointer-events: none;
            z-index: -1;
            animation: twinkle 8s ease-in-out infinite;
            opacity: 0.15;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.15; }
            50% { opacity: 0.3; }
        }

        /* Landing Page */
        .landing-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            gap: 50px;
            position: relative;
            z-index: 1;
        }

        .landing-page.hidden {
            display: none;
        }

        .title-section {
            animation: fade-glow-in 1.5s ease-out;
        }

        .title-section h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 12vw, 5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: #d4af37;
            text-shadow:
                0 0 10px rgba(212, 175, 55, 0.4),
                0 0 20px rgba(212, 175, 55, 0.6),
                0 0 40px rgba(167, 139, 250, 0.3);
            margin-bottom: 15px;
        }

        .title-section p {
            font-family: 'Cinzel', serif;
            font-size: clamp(1rem, 3vw, 1.4rem);
            color: #a78bfa;
            font-weight: 400;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(167, 139, 250, 0.3);
        }

        .claim-button {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 18px 55px;
            background: linear-gradient(135deg, #d4af37, #ffd700);
            color: #0a0015;
            border: 2px solid #d4af37;
            border-radius: 0;
            cursor: pointer;
            letter-spacing: 3px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow:
                0 0 20px rgba(212, 175, 55, 0.4),
                0 0 40px rgba(212, 175, 55, 0.2);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            animation: pulse-button 2s ease-in-out infinite;
        }

        @keyframes pulse-button {
            0%, 100% {
                box-shadow:
                    0 0 20px rgba(212, 175, 55, 0.4),
                    0 0 40px rgba(212, 175, 55, 0.2);
            }
            50% {
                box-shadow:
                    0 0 30px rgba(212, 175, 55, 0.6),
                    0 0 60px rgba(212, 175, 55, 0.3);
            }
        }

        .claim-button:hover {
            transform: scale(1.08) translateY(-3px);
            box-shadow:
                0 0 30px rgba(212, 175, 55, 0.6),
                0 0 60px rgba(212, 175, 55, 0.4);
        }

        .claim-button:active {
            transform: scale(0.96);
        }

        /* Quest Page */
        .quest-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        .quest-page.hidden {
            display: none;
        }

        .quest-container {
            perspective: 1200px;
            width: 100%;
            max-width: 650px;
            height: 500px;
        }

        .quest-card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            cursor: pointer;
        }

        .quest-card.flipped {
            transform: rotateY(180deg);
        }

        .quest-card-front,
        .quest-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #d4af37;
            border-radius: 0;
            background: linear-gradient(135deg, rgba(10, 0, 21, 0.95), rgba(26, 10, 46, 0.95));
            box-shadow:
                0 0 30px rgba(212, 175, 55, 0.3),
                inset 0 0 30px rgba(212, 175, 55, 0.1);
            padding: 45px;
            backdrop-filter: blur(10px);
            position: relative;
        }

        .quest-card-front::before,
        .quest-card-back::before {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border: 2px solid #d4af37;
            opacity: 0.2;
            pointer-events: none;
            animation: border-glow 3s ease-in-out infinite;
        }

        @keyframes border-glow {
            0%, 100% { box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }
            50% { box-shadow: 0 0 35px rgba(212, 175, 55, 0.5); }
        }

        .quest-card-front {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }

        .quest-icon {
            font-size: 4rem;
            animation: float-icon 3s ease-in-out infinite;
        }

        @keyframes float-icon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .quest-front-text {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #d4af37;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .quest-card-back {
            transform: rotateY(180deg);
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .category-badge {
            display: inline-block;
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 0;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border: 1px solid #a78bfa;
            background: rgba(167, 139, 250, 0.15);
            color: #a78bfa;
            box-shadow: 0 0 10px rgba(167, 139, 250, 0.2);
        }

        .quest-title {
            font-family: 'Cinzel', serif;
            font-size: 1.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fbbf24;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.4);
        }

        .quest-scenario {
            font-family: 'Courier Prime', monospace;
            font-size: 1rem;
            line-height: 1.7;
            color: #d4af37;
            text-align: center;
            white-space: pre-wrap;
            min-height: 50px;
        }

        .typewriter-effect {
            overflow: hidden;
            animation: typewriter 2.2s steps(100) forwards;
            display: inline-block;
        }

        @keyframes typewriter {
            from { width: 0; }
            to { width: 100%; }
        }

        .answers-container {
            display: none;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            margin-top: 15px;
        }

        .answers-container.active {
            display: flex;
            animation: fade-in 0.5s ease-out;
        }

        .answer-button {
            font-family: 'Space Mono', monospace;
            padding: 12px 16px;
            background: rgba(212, 175, 55, 0.1);
            color: #d4af37;
            border: 2px solid #d4af37;
            border-radius: 0;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            text-align: left;
            letter-spacing: 0.5px;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        .answer-button:hover:not(:disabled) {
            background: rgba(212, 175, 55, 0.25);
            transform: translateX(5px);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .answer-button:disabled {
            cursor: not-allowed;
        }

        .answer-button.correct {
            background: rgba(16, 185, 129, 0.3);
            border-color: #10b981;
            color: #10b981;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        .answer-button.incorrect {
            background: rgba(220, 38, 38, 0.3);
            border-color: #dc2626;
            color: #dc2626;
            box-shadow: 0 0 15px rgba(220, 38, 38, 0.4);
        }

        .feedback {
            display: none;
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            font-weight: 700;
            text-align: center;
            padding: 12px;
            border: 2px solid;
            border-radius: 0;
            letter-spacing: 1px;
            animation: fade-in 0.5s ease-out;
        }

        .feedback.active {
            display: block;
        }

        .feedback.correct {
            border-color: #10b981;
            color: #10b981;
            background: rgba(16, 185, 129, 0.15);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
        }

        .feedback.incorrect {
            border-color: #dc2626;
            color: #dc2626;
            background: rgba(220, 38, 38, 0.15);
            box-shadow: 0 0 10px rgba(220, 38, 38, 0.3);
        }

        .explanation {
            display: none;
            font-size: 0.9rem;
            line-height: 1.6;
            background: rgba(212, 175, 55, 0.1);
            padding: 15px;
            border-left: 3px solid #d4af37;
            color: #e0d5b7;
            text-align: left;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
            animation: fade-in 0.6s ease-out;
        }

        .explanation.active {
            display: block;
        }

        .next-button {
            display: none;
            font-family: 'Cinzel', serif;
            padding: 14px 45px;
            background: linear-gradient(135deg, #d4af37, #ffd700);
            color: #0a0015;
            border: 2px solid #d4af37;
            border-radius: 0;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.95rem;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            letter-spacing: 1.5px;
            margin-top: 15px;
        }

        .next-button.active {
            display: block;
            animation: fade-in 0.5s ease-out;
        }

        .next-button:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
        }

        @keyframes fade-glow-in {
            from {
                opacity: 0;
                text-shadow: 0 0 0 rgba(212, 175, 55, 0);
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 768px) {
            .title-section h1 {
                font-size: 2.8rem;
            }

            .quest-container {
                height: 450px;
            }

            .quest-card-front,
            .quest-card-back {
                padding: 35px 25px;
            }

            .quest-scenario {
                font-size: 0.95rem;
            }

            .answer-button {
                padding: 11px 14px;
                font-size: 0.85rem;
            }

            .claim-button {
                font-size: 1rem;
                padding: 15px 40px;
            }
        }

        @media (max-width: 480px) {
            body { padding: 15px; }

            .title-section h1 {
                font-size: 2rem;
                letter-spacing: 3px;
            }

            .quest-container {
                height: 350px;
            }

            .quest-card-front,
            .quest-card-back {
                padding: 25px 20px;
            }

            .quest-icon {
                font-size: 3rem;
            }

            .quest-scenario {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <!-- Landing Page -->
    <div class="landing-page" id="landingPage">
        <div class="title-section">
            <h1>THE HUMAN STACK</h1>
            <p>AI is leveling up. So are you.</p>
        </div>
        <button class="claim-button" id="claimButton">CLAIM YOUR DAILY QUEST</button>
    </div>

    <!-- Quest Page -->
    <div class="quest-page hidden" id="questPage">
        <div class="quest-container">
            <div class="quest-card" id="questCard">
                <!-- Front -->
                <div class="quest-card-front">
                    <div class="quest-icon">✦</div>
                    <div class="quest-front-text">DAILY QUEST</div>
                </div>

                <!-- Back -->
                <div class="quest-card-back">
                    <div class="category-badge" id="categoryBadge">DIVINATION</div>
                    <div class="quest-title" id="questTitle"></div>
                    <div class="quest-scenario" id="questScenario"></div>
                    <div class="answers-container" id="answersContainer"></div>
                    <div class="feedback" id="feedback"></div>
                    <div class="explanation" id="explanation"></div>
                    <button class="next-button" id="nextButton">TAKE ANOTHER QUEST →</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // All 43 Quests with exact scenarios and answers
        const quests = [
            // DIVINATION (1-7)
            {
                title: "Inversion",
                category: "DIVINATION",
                scenario: "Designing onboarding. What would make it terrible?",
                answers: ["Think backwards from failure", "Copy competitors", "Add more features"],
                correct: 0,
                explanation: "Inversion flips problems on their head. By asking 'how can this fail?' you spot real risks competitors miss."
            },
            {
                title: "Second-Order Thinking",
                category: "DIVINATION",
                scenario: "KM budget cut. First-order: costs drop. What's the ripple?",
                answers: ["Agents ask Slack instead", "Reduced expenses", "Fewer meetings"],
                correct: 0,
                explanation: "Every action has second-order effects. Cut KB costs, agents find info elsewhere. Systems shift, not just budgets."
            },
            {
                title: "Map Is Not Territory",
                category: "DIVINATION",
                scenario: "Dashboard shows 94% KB freshness. Agents skip KB, ask Slack. Why the gap?",
                answers: ["Reality differs from the metric", "Dashboard is broken", "Agents are lazy"],
                correct: 0,
                explanation: "The map (dashboard) isn't the territory (actual behavior). Trust what you see on the ground."
            },
            {
                title: "Hanlon's Razor",
                category: "DIVINATION",
                scenario: "Harsh feedback feels personal. Before escalating?",
                answers: ["Assume incompetence before malice", "Fire them", "Ignore it"],
                correct: 0,
                explanation: "Most friction is miscommunication, not intent. Assume good intent first. Saves relationships and drama."
            },
            {
                title: "Empty Boat",
                category: "DIVINATION",
                scenario: "Proposal sent. 3 days, no response. Brain spirals. What's real?",
                answers: ["Separate the action from the actor", "They hate your idea", "You're doomed"],
                correct: 0,
                explanation: "No response is absence, not rejection. Don't personalize silence. It's just a boat passing by."
            },
            {
                title: "Cobra Effect",
                category: "DIVINATION",
                scenario: "KPI: resolve support tickets in 4 hours. Metrics improve. Satisfaction tanks. Why?",
                answers: ["Perverse incentives backfire", "Team is incompetent", "Customers are ungrateful"],
                correct: 0,
                explanation: "The incentive (speed) breaks what matters (quality). Game the metric, lose the mission. Classic cobra effect."
            },
            {
                title: "Goodhart's Law",
                category: "DIVINATION",
                scenario: "Measure 'articles published per month.' Output explodes. Quality collapses. Fix?",
                answers: ["Metrics corrupt when optimized", "Publish fewer articles", "Fire the writer"],
                correct: 0,
                explanation: "Once a measure becomes a target, it stops being useful. The metric gets gamed. Measure outcomes, not outputs."
            },

            // STRATEGY (8-15)
            {
                title: "Decision Journal",
                category: "STRATEGY",
                scenario: "Made a big decision 6 months ago. It took 3x longer, but worked. How do you learn from it?",
                answers: ["Write down reasoning before outcome revealed", "Trust your memory", "Ignore it"],
                correct: 0,
                explanation: "Documenting decisions before results keeps you honest. Reveals your actual reasoning, not hindsight-biased memory."
            },
            {
                title: "Fear-Setting",
                category: "STRATEGY",
                scenario: "Considering leaving a stable job for freelance. Rational way to evaluate?",
                answers: ["Write worst case, probability, recovery plan", "Trust your gut", "Ask others"],
                correct: 0,
                explanation: "Tim Ferriss's framework: most catastrophes are survivable. Writing it down reveals fears are smaller than they feel."
            },
            {
                title: "Pre-mortem",
                category: "STRATEGY",
                scenario: "Portal launching in 6 weeks. Imagine it failed. What went wrong?",
                answers: ["Work backwards from failure to prevent it", "Stay optimistic", "Cross fingers"],
                correct: 0,
                explanation: "Imagine failure before it happens. Uncovers risks traditional planning misses. 30min now saves months later."
            },
            {
                title: "Five Whys",
                category: "STRATEGY",
                scenario: "Customer got wrong info. Why? Article was old. Why? No review schedule. Why? Why? Why?",
                answers: ["Ask why five times to reach root cause", "Fix the symptom", "Blame the writer"],
                correct: 0,
                explanation: "Each 'why' peels back a layer. Symptoms vs. root causes. Stop at surface, you fix nothing."
            },
            {
                title: "3-1-1 Method",
                category: "STRATEGY",
                scenario: "API timing out. 200 customers affected. Three options to fix it. How present to leadership?",
                answers: ["3 wins, 1 challenge, 1 learn", "One monologue", "Ask for advice"],
                correct: 0,
                explanation: "Balanced reflection. 3-1-1 creates psychological safety while driving toward solutions. Leaders trust this structure."
            },
            {
                title: "DACI",
                category: "STRATEGY",
                scenario: "Choosing a CMS. 6 people think veto power. 3 meetings, no decision. Fix?",
                answers: ["Define roles: Driver, Approver, Contributor, Informed", "Vote", "CEO decides alone"],
                correct: 0,
                explanation: "Clear decision roles prevent paralysis. One Driver, one Approver, get input from others. Moves things."
            },
            {
                title: "Bias for Action",
                category: "STRATEGY",
                scenario: "Choosing a project tool (reversible decision). How long to deliberate?",
                answers: ["Act decisively with 70% info", "Wait for perfection", "Endless analysis"],
                correct: 0,
                explanation: "Perfect information never arrives. Moving forward with 70% certainty beats perfect analysis that comes too late."
            },
            {
                title: "KWL",
                category: "STRATEGY",
                scenario: "Evaluating an AI writing tool. Know? Wonder? Discover (after testing)?",
                answers: ["Map knowledge before, during, after", "Jump to conclusions", "Skip learning"],
                correct: 0,
                explanation: "K-W-L structures learning. What do you know? What do you wonder? What did you learn? Focuses discovery."
            },

            // ENCHANTMENT (16-23)
            {
                title: "Personal README",
                category: "ENCHANTMENT",
                scenario: "New team asks: When are you sharpest? How do you prefer feedback? Make yourself understood?",
                answers: ["Write a personal README", "Assume they'll figure you out", "Never explain"],
                correct: 0,
                explanation: "A personal README prevents misunderstandings. Share communication style, values, work habits. Team knows you."
            },
            {
                title: "FLIP It",
                category: "ENCHANTMENT",
                scenario: "Need approval for a 1-week delay. Write 4 paragraphs of context, then ask. Better way?",
                answers: ["Frame, Learn, Innovate, Prove", "More paragraphs", "Just ask"],
                correct: 0,
                explanation: "FLIP structures problem-solving. Frame → Learn from data → Innovate solution → Prove it works. Persuasive."
            },
            {
                title: "One-Pager",
                category: "ENCHANTMENT",
                scenario: "Complex project. Status, developments, decisions, risks. Fit on one page?",
                answers: ["Constraints force clarity", "Need more detail", "Skip the plan"],
                correct: 0,
                explanation: "If you can't fit it on one page, you don't understand it yet. Constraints force essence. Execs love one-pagers."
            },
            {
                title: "Weekly Update",
                category: "ENCHANTMENT",
                scenario: "Annual review due. Remember what you shipped in March? How solve?",
                answers: ["Send weekly updates", "Keep detailed journal", "Hope they remember"],
                correct: 0,
                explanation: "Regular updates align teams, surface blockers, create accountability without micromanagement. Future you thanks you."
            },
            {
                title: "Skip-Level",
                category: "ENCHANTMENT",
                scenario: "Meeting with your skip-level. Talk daily tasks or their strategic goals?",
                answers: ["Ask about their context and strategy", "Talk about tasks", "Stay quiet"],
                correct: 0,
                explanation: "Skip-level conversations prevent silos. Understand strategy, get feedback beyond your manager. Game-changer."
            },
            {
                title: "Blue/Green/Red Speakers",
                category: "ENCHANTMENT",
                scenario: "Three speaker types: quiet (Blue), raises concerns (Green), complains (Red). How facilitate?",
                answers: ["Rotate speaker roles each meeting", "Let dominant person lead", "No structure"],
                correct: 0,
                explanation: "Rotating roles ensures different perspectives. Blue (status), Green (strategy), Red (wildcards). Keeps meetings alive."
            },
            {
                title: "Teach-Back",
                category: "ENCHANTMENT",
                scenario: "Explain workflow. They say 'I understand.' Believe them?",
                answers: ["Have them explain it back to you", "Trust their word", "Assume they got it"],
                correct: 0,
                explanation: "Teach-back reveals misunderstandings people won't voice. 'I understand' ≠ true comprehension. Have them teach back."
            },
            {
                title: "Working Out Loud",
                category: "ENCHANTMENT",
                scenario: "Building dashboard for 2 weeks. Colleague: 'I built something similar.' Prevent duplicates?",
                answers: ["Share work publicly as you go", "Work in secret", "Ask permission first"],
                correct: 0,
                explanation: "Working out loud creates serendipitous connections. Prevents duplicate work, attracts collaborators, speeds feedback."
            },

            // TRANSMUTATION (24-31)
            {
                title: "ONE Thing",
                category: "TRANSMUTATION",
                scenario: "Monday: 23 items on list. ONE Thing: what makes rest easier?",
                answers: ["Find the leverage point", "Do them all equally", "Skip the hard ones"],
                correct: 0,
                explanation: "Not all tasks are equal. Find the one thing whose completion cascades into other successes. Usually hard, but payoff is massive."
            },
            {
                title: "Energy-Based",
                category: "TRANSMUTATION",
                scenario: "Sharp 9-11am, then 3-4:30pm. Rest is fog. How structure?",
                answers: ["Schedule hard work during peak energy", "Work linearly", "Ignore energy patterns"],
                correct: 0,
                explanation: "Align important work with peak energy. Your chronotype matters. Do deep work when sharp, admin when foggy."
            },
            {
                title: "Parkinson's Law",
                category: "TRANSMUTATION",
                scenario: "1-hour meeting. Agenda is 20min, tangents eat 40. What if you'd said 25min?",
                answers: ["Work expands to fill allotted time", "More time = better", "Time doesn't matter"],
                correct: 0,
                explanation: "Constraints force focus. Tight deadlines kill perfectionism, tangents, waste. 25min meeting probably finishes in 25."
            },
            {
                title: "Two-Minute Rule",
                category: "TRANSMUTATION",
                scenario: "Email: confirm meeting. 15sec reply. You think 'later.' Sits, nags, buried. Cost?",
                answers: ["Do it now if under 2 minutes", "Batch small tasks", "Defer everything"],
                correct: 0,
                explanation: "Small tasks pile into overwhelm. Do them now (15sec), not later (haunts you). Kills the nag weight."
            },
            {
                title: "Breaking Boxes",
                category: "TRANSMUTATION",
                scenario: "KB needs 5min update. You defer it. 2 weeks later: customer disaster. Why defer?",
                answers: ["Identify limiting beliefs and reframe", "Accept constraints", "Never question limits"],
                correct: 0,
                explanation: "Many limits are self-imposed. 'I don't have time for that' is often a belief, not reality. Challenge it."
            },
            {
                title: "Fire and Forget",
                category: "TRANSMUTATION",
                scenario: "Manager: understand why self-service dropped. Send feedback immediately (imperfect) or wait for perfect data?",
                answers: ["Send timely feedback freely", "Wait for perfect moment", "Never give feedback"],
                correct: 0,
                explanation: "Delayed feedback loses context and impact. Timely feedback (imperfect) beats perfect analysis that arrives too late."
            },
            {
                title: "Don't-Do List",
                category: "TRANSMUTATION",
                scenario: "Overcommitted: meetings, side projects, stakeholders. How protect time?",
                answers: ["Track what NOT to do and stop", "Say yes to everything", "Hope for balance"],
                correct: 0,
                explanation: "It's not just what to do; it's what to stop. Explicitly decide what doesn't align with goals. Say no."
            },
            {
                title: "Map Then Automate",
                category: "TRANSMUTATION",
                scenario: "Use AI to 'speed up writing.' Paste → generic output → heavy editing. Time saved: zero. Fix?",
                answers: ["Understand the process first, then automate", "Automate without understanding", "Give up"],
                correct: 0,
                explanation: "Automating a broken process scales the problem. Map first (understand), then optimize. AI magnifies, doesn't fix."
            },

            // ITERATION (32-40)
            {
                title: "Kaizen",
                category: "ITERATION",
                scenario: "Friday 15min: find one unnecessary step, one friction point. After a year?",
                answers: ["Small increments compound into transformation", "Big changes only", "Ignore friction"],
                correct: 0,
                explanation: "1% daily improvement compounds. After a year, you've redesigned the workflow. Kaizen is relentless small progress."
            },
            {
                title: "Gemba",
                category: "ITERATION",
                scenario: "KB metrics look good. Agents skip it, ask Slack instead. Discover?",
                answers: ["Go observe where work actually happens", "Trust the metrics", "Ignore reality"],
                correct: 0,
                explanation: "Gemba walks reveal what's actually happening, not what reports claim. Go to the source. See for yourself."
            },
            {
                title: "Feedback Flywheel",
                category: "ITERATION",
                scenario: "Ship something. Make improvement a built-in loop (feedback → iteration → better feedback)?",
                answers: ["Build cycles of learning from feedback", "Get feedback once and done", "Avoid feedback loops"],
                correct: 0,
                explanation: "Best products are built through tight feedback cycles. Ship, gather signal, iterate, improve. Repeat."
            },
            {
                title: "Experiment Log",
                category: "ITERATION",
                scenario: "Hypothesis: 30-sec videos reduce support tickets 20%. How prove it?",
                answers: ["Document experiments systematically", "Trust gut", "Never test"],
                correct: 0,
                explanation: "An experiment log builds knowledge: what works, what doesn't. Prevents repeated failures, enables pattern recognition."
            },
            {
                title: "Shu-Ha-Ri",
                category: "ITERATION",
                scenario: "Writer follows guide (Shu). After 6mo, adapts (Ha). After 2yr, rewrites (Ri). Three stages of?",
                answers: ["Progression to mastery", "Types of writers", "Skill levels"],
                correct: 0,
                explanation: "Shu-Ha-Ri: Imitate → Adapt → Transcend. Learn fundamentals, adapt them, then innovate. Universal to all mastery."
            },
            {
                title: "Rapid Prototype",
                category: "ITERATION",
                scenario: "Newsletter proposal: spend 2 weeks designing OR send 30min email mock-up. Signal faster?",
                answers: ["Quick prototype beats perfect plan", "Invest time upfront", "Skip testing"],
                correct: 0,
                explanation: "Prototypes that take days beat specs that take months. Speed to signal beats theoretical perfection."
            },
            {
                title: "Red Teaming",
                category: "ITERATION",
                scenario: "Redesigned onboarding. Step 4: missing access. Step 7: form buried. Catch it?",
                answers: ["Assign someone to argue against your idea", "Only positive feedback", "Skip critique"],
                correct: 0,
                explanation: "Red teams systematically find flaws. Stress-test ideas before launch. Catches blind spots consensus misses."
            },
            {
                title: "Journey Map",
                category: "ITERATION",
                scenario: "Customer cancels: Google → article → greyed button → 12min call → decline. Map the feelings?",
                answers: ["Visualize full customer flow and emotions", "Trust your guess", "Ignore experience"],
                correct: 0,
                explanation: "Journey mapping reveals moments of truth and frustration. Understand the full path, not just one step."
            },
            {
                title: "Johari Window",
                category: "ITERATION",
                scenario: "You believe you communicate well. Feedback: you dominate. You know imposter, don't share. Grow?",
                answers: ["Understand blind spots through feedback", "Trust self-perception", "Avoid feedback"],
                correct: 0,
                explanation: "The Johari Window: others see things you don't. You're blind to your blindspots. Ask for feedback to grow."
            },

            // ASCENSION (41-43)
            {
                title: "Swipe File",
                category: "ASCENSION",
                scenario: "Read brilliant email. 'Wish I wrote like that.' Save it, tag it. 3mo later, use the structure. Building?",
                answers: ["A reference library of what works", "Copy their exact words", "Ignore great writing"],
                correct: 0,
                explanation: "A swipe file is your inspiration library. Not for plagiarism—for studying what works and why. Steal techniques, not content."
            },
            {
                title: "Parking Lot",
                category: "ASCENSION",
                scenario: "Quarterly planning: 'Build community forum.' Brilliant, out of scope. 6mo later, need retention. Execute?",
                answers: ["Capture ideas, discuss them later", "Discuss everything now", "Forget good ideas"],
                correct: 0,
                explanation: "Parking lots keep meetings focused while good ideas aren't lost. Write it down, revisit later. Genius often waits."
            },
            {
                title: "Work-Sharing Buddy",
                category: "ASCENSION",
                scenario: "Send proposal to VP. Buddy: 'Bury recommendation. Lead with it.' You send deck. Buddy catches: slide 7 vs 3 mismatch. Value?",
                answers: ["Get peer feedback through partnership", "Work entirely alone", "Never share drafts"],
                correct: 0,
                explanation: "Work-sharing buddies provide psychological safety and fresh eyes. They catch what you miss. Accelerates improvement."
            }
        ];

        let currentQuestIndex = 0;

        function init() {
            setupEventListeners();
            shuffleQuests();
        }

        function setupEventListeners() {
            document.getElementById('claimButton').addEventListener('click', startQuest);
            document.getElementById('questCard').addEventListener('click', revealQuest);
            document.getElementById('nextButton').addEventListener('click', nextQuest);
        }

        function shuffleQuests() {
            for (let i = quests.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [quests[i], quests[j]] = [quests[j], quests[i]];
            }
            currentQuestIndex = 0;
        }

        function startQuest() {
            document.getElementById('landingPage').classList.add('hidden');
            document.getElementById('questPage').classList.remove('hidden');
            resetCard();
        }

        function resetCard() {
            const card = document.getElementById('questCard');
            card.classList.remove('flipped');
            document.getElementById('answersContainer').classList.remove('active');
            document.getElementById('answersContainer').innerHTML = '';
            document.getElementById('feedback').classList.remove('active');
            document.getElementById('explanation').classList.remove('active');
            document.getElementById('nextButton').classList.remove('active');
        }

        function revealQuest() {
            const card = document.getElementById('questCard');
            if (!card.classList.contains('flipped')) {
                card.classList.add('flipped');
                loadQuest();
            }
        }

        function loadQuest() {
            const quest = quests[currentQuestIndex];

            document.getElementById('categoryBadge').textContent = quest.category;
            document.getElementById('questTitle').textContent = quest.title;

            const scenarioEl = document.getElementById('questScenario');
            scenarioEl.innerHTML = '';
            const typewriterSpan = document.createElement('span');
            typewriterSpan.className = 'typewriter-effect';
            typewriterSpan.textContent = quest.scenario;
            scenarioEl.appendChild(typewriterSpan);

            setTimeout(() => {
                loadAnswers(quest);
            }, 2400);
        }

        function loadAnswers(quest) {
            const container = document.getElementById('answersContainer');
            container.innerHTML = '';
            container.classList.add('active');

            quest.answers.forEach((answer, index) => {
                const btn = document.createElement('button');
                btn.className = 'answer-button';
                btn.textContent = answer;
                btn.disabled = false;
                btn.onclick = () => selectAnswer(index, quest);
                container.appendChild(btn);
            });
        }

        function selectAnswer(index, quest) {
            const buttons = document.querySelectorAll('.answer-button');
            buttons.forEach(btn => btn.disabled = true);

            const isCorrect = index === quest.correct;
            buttons[index].classList.add(isCorrect ? 'correct' : 'incorrect');
            if (quest.correct !== index) {
                buttons[quest.correct].classList.add('correct');
            }

            const feedback = document.getElementById('feedback');
            feedback.classList.add('active');
            feedback.classList.add(isCorrect ? 'correct' : 'incorrect');
            feedback.textContent = isCorrect ? '✓ CORRECT' : '✗ INCORRECT';

            setTimeout(() => {
                const explanation = document.getElementById('explanation');
                explanation.textContent = quest.explanation;
                explanation.classList.add('active');

                setTimeout(() => {
                    document.getElementById('nextButton').classList.add('active');
                }, 600);
            }, 1800);
        }

        function nextQuest() {
            currentQuestIndex++;
            if (currentQuestIndex >= quests.length) {
                shuffleQuests();
            }
            resetCard();
        }

        init();
    </script>
</body>
</html>
