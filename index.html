<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Shrine of Knowledge</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at top, #3f2a6b 0%, #201433 45%, #0b1128 100%);
        color: #f3e8ff;
      }

      .landing {
        width: min(95vw, 980px);
        text-align: center;
        padding: 3rem 2rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 3rem);
        letter-spacing: 0.02em;
      }

      .subtitle {
        margin: 0.85rem 0 2rem;
        font-size: clamp(1rem, 2.3vw, 1.2rem);
        color: #d8c7ff;
      }

      .blessing-button {
        padding: 0.85rem 1.8rem;
        border: 1px solid #c5b3ff;
        border-radius: 999px;
        background: linear-gradient(135deg, #7050c7, #4d75d8);
        color: #f9f5ff;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 180ms ease, box-shadow 220ms ease, filter 220ms ease;
        box-shadow: 0 0 0 rgba(142, 116, 255, 0);
      }

      .blessing-button:hover {
        transform: translateY(-2px);
        filter: brightness(1.07);
        box-shadow: 0 0 20px rgba(169, 136, 255, 0.65), 0 0 34px rgba(91, 149, 255, 0.35);
      }

      .blessing-button:active {
        transform: translateY(0);
      }

      .blessing-button:disabled {
        cursor: wait;
        opacity: 0.88;
        transform: none;
        filter: saturate(0.9);
      }

      .discovery-count {
        margin-top: 0.85rem;
        font-size: 0.86rem;
        color: #cbb8f4;
      }

      .blessing-card {
        --rarity-color: #9a9aa4;
        --rarity-border: rgba(154, 154, 164, 0.5);
        --rarity-glow: rgba(154, 154, 164, 0.22);
        position: relative;
        border-radius: 14px;
        padding: 1.2rem;
        text-align: left;
        background: rgba(18, 13, 31, 0.64);
        border: 1px solid var(--rarity-border);
        box-shadow: 0 0 16px var(--rarity-glow), inset 0 0 0 1px color-mix(in srgb, var(--rarity-color) 38%, transparent);
        backdrop-filter: blur(2px);
      }

      .blessing-card::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        border: 1px solid color-mix(in srgb, var(--rarity-color) 58%, transparent);
        pointer-events: none;
      }

      .blessing-card h2 {
        margin: 0;
        color: var(--rarity-color);
        font-size: 1.15rem;
      }

      .blessing-card p {
        margin: 0.55rem 0 0;
        color: #e1d8ff;
        line-height: 1.45;
      }

      .framework-view {
        margin-top: 0.8rem;
        text-align: left;
      }

      .framework-panel {
        padding: 1.4rem;
        border-radius: 16px;
      }

      .framework-top {
        display: grid;
        grid-template-columns: minmax(230px, 320px) minmax(0, 1fr);
        gap: 1.2rem;
        align-items: start;
      }

      .framework-image {
        min-height: 170px;
        border-radius: 12px;
        border: 1px dashed color-mix(in srgb, var(--rarity-color) 70%, #fff 30%);
        background: linear-gradient(140deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.01));
        display: grid;
        place-items: center;
        color: #e4d7ff;
        letter-spacing: 0.03em;
        font-size: 0.88rem;
      }

      .framework-name {
        margin: 0.9rem 0 0;
        font-size: 1.2rem;
      }

      .mini-stats {
        margin-top: 0.72rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
      }

      .mini-stats span {
        font-size: 0.74rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: #e6dcff;
        border: 1px solid rgba(228, 208, 255, 0.34);
        padding: 0.32rem 0.5rem;
        border-radius: 999px;
        background: rgba(20, 14, 36, 0.62);
      }

      .framework-title {
        margin: 0.35rem 0 0;
        font-size: clamp(1.55rem, 3.8vw, 2.2rem);
      }

      .framework-tagline {
        margin-top: 0.55rem;
        font-size: 1rem;
        color: #e6dcff;
      }

      .framework-section {
        margin-top: 1.2rem;
        padding-top: 1rem;
        border-top: 1px solid color-mix(in srgb, var(--rarity-color) 35%, transparent);
      }

      .framework-section h4 {
        margin: 0;
        font-size: 0.92rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: color-mix(in srgb, var(--rarity-color) 82%, #fff 18%);
      }

      .framework-section p {
        margin-top: 0.6rem;
      }

      .stat-row {
        margin-top: 0.8rem;
        display: grid;
        grid-template-columns: 135px minmax(0, 1fr);
        align-items: center;
        gap: 0.75rem;
      }

      .stat-row span {
        font-size: 0.88rem;
        color: #eee4ff;
      }

      .bar {
        width: 100%;
        height: 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
        overflow: hidden;
      }

      .bar i {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, color-mix(in srgb, var(--rarity-color) 70%, #b39cff 30%), var(--rarity-color));
      }

      .detail-box-grid {
        margin-top: 0.95rem;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.85rem;
      }

      .detail-box {
        padding: 0.85rem 0.95rem;
        border-radius: 12px;
        border: 1px solid color-mix(in srgb, var(--rarity-color) 42%, transparent);
        background: rgba(17, 12, 31, 0.58);
      }

      .detail-box h5 {
        margin: 0;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: color-mix(in srgb, var(--rarity-color) 84%, #fff 16%);
      }

      .detail-box p {
        margin: 0.5rem 0 0;
        font-size: 0.92rem;
      }

      .back-button {
        margin-top: 1.3rem;
        width: 100%;
      }

      .action-row {
        margin-top: 1rem;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }

      @media print {
        :root {
          color-scheme: light;
        }

        body {
          background: #fff;
          color: #000;
          display: block;
          min-height: auto;
          padding: 0;
          margin: 0;
          font-size: 12pt;
        }

        .landing {
          width: 100%;
          max-width: none;
          padding: 0;
        }

        .blessing-card,
        .framework-image,
        .detail-box {
          background: #fff;
          border: 1px solid #111;
          color: #000;
          box-shadow: none;
          backdrop-filter: none;
        }

        .blessing-card::before,
        .bar,
        .bar i {
          display: none;
        }

        .framework-title,
        .framework-name,
        .framework-tagline,
        .framework-section h4,
        .framework-section p,
        .detail-box h5,
        .detail-box p,
        .mini-stats span,
        .rarity-label,
        .stat-row span {
          color: #000;
        }

        .framework-top,
        .detail-box-grid {
          gap: 0.6rem;
        }

        .framework-section {
          margin-top: 0.8rem;
          padding-top: 0.8rem;
          border-top: 1px solid #111;
        }

        .mini-stats span {
          background: #fff;
          border-color: #111;
        }

        .stat-row {
          grid-template-columns: 1fr;
          gap: 0.3rem;
          margin-top: 0.45rem;
        }

        .no-print,
        #shrineShell {
          display: none !important;
        }
      }

      @media (max-width: 780px) {
        .landing {
          padding: 2rem 1rem;
        }

        .framework-top {
          grid-template-columns: 1fr;
        }

        .detail-box-grid {
          grid-template-columns: 1fr;
        }
      }

      .rarity-label {
        margin-top: 0.5rem;
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: color-mix(in srgb, var(--rarity-color) 85%, #fff 15%);
      }

      .rarity-common {
        --rarity-color: #b4bac8;
        --rarity-border: rgba(164, 172, 187, 0.55);
        --rarity-glow: rgba(146, 152, 165, 0.2);
      }

      .rarity-rare {
        --rarity-color: #7ea7ff;
        --rarity-border: rgba(126, 167, 255, 0.62);
        --rarity-glow: rgba(96, 146, 255, 0.24);
      }

      .rarity-epic {
        --rarity-color: #be8dff;
        --rarity-border: rgba(190, 141, 255, 0.66);
        --rarity-glow: rgba(188, 117, 255, 0.32);
      }

      .rarity-legendary {
        --rarity-color: #f1cc6a;
        --rarity-border: rgba(241, 204, 106, 0.75);
        --rarity-glow: rgba(251, 218, 113, 0.44);
        box-shadow: 0 0 26px rgba(251, 218, 113, 0.36),
          0 0 42px rgba(251, 186, 77, 0.2),
          inset 0 0 0 1px rgba(241, 204, 106, 0.44);
      }

      .blessing-enter {
        animation: blessingFade 450ms ease;
      }

      .rarity-epic.blessing-enter {
        animation: blessingFade 450ms ease, epicPulse 2.4s ease-in-out infinite;
      }

      @keyframes epicPulse {
        0%,
        100% {
          box-shadow: 0 0 15px rgba(188, 117, 255, 0.24),
            inset 0 0 0 1px rgba(190, 141, 255, 0.34);
        }
        50% {
          box-shadow: 0 0 24px rgba(188, 117, 255, 0.38),
            inset 0 0 0 1px rgba(190, 141, 255, 0.5);
        }
      }

      @keyframes blessingFade {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <main class="landing">
      <section id="shrineShell">
        <h1>The Shrine of Knowledge</h1>
        <p class="subtitle">Seek your wisdom blessing</p>
        <button class="blessing-button" id="blessBtn" type="button">Receive Today’s Blessing</button>
        <p class="discovery-count" id="discoveryCount" aria-live="polite"></p>
      </section>
      <section class="framework-view" id="frameworkView" aria-live="polite" hidden></section>
    </main>

    <script>
      const button = document.getElementById("blessBtn");
      const shrineShell = document.getElementById("shrineShell");
      const frameworkView = document.getElementById("frameworkView");
      const discoveryCount = document.getElementById("discoveryCount");
      const blessingStorageKey = "dailyBlessing";
      let frameworks = [];
      let todaysBlessingId = null;

      function readBlessing() {
        const raw = localStorage.getItem(blessingStorageKey);
        if (!raw) return {};

        try {
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === "object" ? parsed : {};
        } catch {
          return {};
        }
      }

      function writeBlessing(blessing) {
        localStorage.setItem(blessingStorageKey, JSON.stringify(blessing));
      }

      function setStatus(message) {
        discoveryCount.textContent = message;
      }

      function showShrineView() {
        frameworkView.hidden = true;
        shrineShell.hidden = false;
      }

      function showDetailView() {
        shrineShell.hidden = true;
        frameworkView.hidden = false;
      }

      function getTodayString() {
        return new Date().toISOString().slice(0, 10);
      }

      function getYesterdayString(todayString) {
        const date = new Date(`${todayString}T00:00:00`);
        date.setDate(date.getDate() - 1);
        return date.toISOString().slice(0, 10);
      }

      function pickFramework(excludedId) {
        const pool =
          excludedId && frameworks.length > 1
            ? frameworks.filter((framework) => framework.id !== excludedId)
            : frameworks;

        if (pool.length === 0) return null;
        return pool[Math.floor(Math.random() * pool.length)];
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }


      function getTryThisToday(framework) {
        const byId = {
          inversion: "List 3 ways your current project could fail.",
          "second-order-thinking": "Write 1 likely consequence at 30, 90, and 365 days.",
          "five-whys": "Pick one issue and ask why five times using evidence only.",
          kaizen: "Improve one recurring step today and measure the before/after.",
          "swipe-file": "Study 3 examples and adapt one pattern into your draft.",
          "first-principles": "Challenge one assumption and restate the problem from facts.",
          "pareto-principle": "Rank tasks by impact and delete one low-yield task today.",
          "ooda-loop": "Run one quick Observe→Orient→Decide→Act cycle before lunch.",
          "jobs-to-be-done": "Ask one user what progress they were trying to make.",
          premortem: "Name the top 3 risks and assign one owner to each."
        };

        if (framework?.id && byId[framework.id]) return byId[framework.id];
        return "Pick one decision today and write the next concrete action in one sentence.";
      }

      // Optional sound support:
      // function playRevealChime() {
      //   const audio = new Audio("./chime.mp3");
      //   audio.volume = 0.2;
      //   audio.play().catch(() => {});
      // }

      function renderBlessing(framework) {
        const rarityClass = `rarity-${(framework.rarity || "Common").toLowerCase()}`;
        const stats = framework.stats || {};
        const adaptability = Number(stats.adaptability || 0);
        const logic = Number(stats.logic || 0);
        const efficiency = Number(stats.efficiency || 0);

        showDetailView();
        frameworkView.innerHTML = `
          <article class="blessing-card blessing-enter framework-panel ${rarityClass}">
            <div class="framework-top">
              <div class="framework-left">
                <div class="framework-image" role="img" aria-label="${framework.name} visual placeholder">
                  Visual Placeholder
                </div>
                <h3 class="framework-name">${framework.name}</h3>
                <div class="mini-stats">
                  <span>${framework.category || "General"}</span>
                  <span>ADP ${adaptability}</span>
                  <span>LOG ${logic}</span>
                  <span>EFF ${efficiency}</span>
                </div>
              </div>
              <div class="framework-right">
                <p class="rarity-label">${framework.rarity || "Common"}</p>
                <h2 class="framework-title">${framework.name}</h2>
                <p class="framework-tagline">${framework.tagline || "A framework for better decisions and execution."}</p>
              </div>
            </div>

            <section class="framework-section">
              <h4>Innate Ability</h4>
              <p>${framework.application || "No application guidance available yet."}</p>
            </section>

            <section class="framework-section">
              <h4>Stats</h4>
              <div class="stat-row">
                <span>Adaptability</span>
                <div class="bar"><i style="width: ${adaptability}%"></i></div>
              </div>
              <div class="stat-row">
                <span>Logic Flow</span>
                <div class="bar"><i style="width: ${logic}%"></i></div>
              </div>
              <div class="stat-row">
                <span>Efficiency</span>
                <div class="bar"><i style="width: ${efficiency}%"></i></div>
              </div>
            </section>

            <section class="framework-section">
              <h4>Detailed Mechanics</h4>
              <p>${framework.mechanics || framework.description || "No detailed mechanics provided."}</p>
              <div class="detail-box-grid">
                <article class="detail-box">
                  <h5>Application Tip</h5>
                  <p>${framework.application || "Apply this framework to your next major decision cycle."}</p>
                </article>
                <article class="detail-box">
                  <h5>Try This Today</h5>
                  <p>${getTryThisToday(framework)}</p>
                </article>
                <article class="detail-box">
                  <h5>Flavor Text</h5>
                  <p>${framework.flavor || "\"Wisdom sharpens where reflection meets action.\""}</p>
                </article>
              </div>
            </section>

            <div class="action-row no-print">
              <button class="back-button" id="backToShrine" type="button">Back to Shrine</button>
              <button class="back-button" id="saveAsPdf" type="button">Save as PDF</button>
            </div>
          </article>
        `;

        const backButton = document.getElementById("backToShrine");
        if (backButton) {
          backButton.addEventListener("click", () => {
            showShrineView();
          });
        }

        const saveAsPdfButton = document.getElementById("saveAsPdf");
        if (saveAsPdfButton) {
          saveAsPdfButton.addEventListener("click", () => {
            window.print();
          });
        }
      }

      async function loadFrameworks() {
        button.disabled = true;
        setStatus("Loading frameworks...");

        try {
          const response = await fetch("./frameworks.json");
          frameworks = await response.json();
          const blessing = readBlessing();
          const today = getTodayString();

          if (blessing.date === today) {
            todaysBlessingId = blessing.id;
            setStatus("Today's blessing is waiting. Enter when ready.");
          } else {
            setStatus("");
          }

          button.disabled = false;
        } catch {
          setStatus("Could not load frameworks.");
        }
      }

      button.addEventListener("click", async () => {
        if (frameworks.length === 0 || button.disabled) return;

        const defaultLabel = "Receive Today’s Blessing";
        button.disabled = true;
        button.textContent = "Channeling wisdom...";

        const previous = readBlessing();
        const today = getTodayString();
        const yesterday = getYesterdayString(today);
        const savedToday = frameworks.find((item) => item.id === todaysBlessingId);
        if (savedToday) {
          renderBlessing(savedToday);
          button.textContent = defaultLabel;
          button.disabled = false;
          return;
        }

        const excludedId = previous.date === yesterday ? previous.id : null;
        const framework = pickFramework(excludedId);
        if (!framework) {
          button.textContent = defaultLabel;
          button.disabled = false;
          return;
        }

        writeBlessing({
          id: framework.id,
          date: today,
        });
        todaysBlessingId = framework.id;
        renderBlessing(framework);
        setStatus("Today's blessing is waiting. Enter when ready.");

        // Optional audio cue:
        // playRevealChime();

        await sleep(420);
        button.textContent = defaultLabel;
        button.disabled = false;
      });

      loadFrameworks();
    </script>
  </body>
</html>
