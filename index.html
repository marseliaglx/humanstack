<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Shrine of Knowledge</title>
    <style>
      :root {
        color-scheme: dark;
        --category-thinking: #be8dff;
        --category-decisions: #7ea7ff;
        --category-communication: #6dd5ed;
        --category-execution: #a78bfa;
        --category-improvement: #34d399;
        --category-career: #fbbf24;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background:
          radial-gradient(circle at 50% 22%, rgba(194, 122, 255, 0.35) 0%, rgba(255, 152, 94, 0.23) 20%, rgba(36, 20, 54, 0.7) 44%, #06060c 84%);
        color: #f3e8ff;
        position: relative;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(circle at center, rgba(194, 122, 255, 0.15), transparent 62%);
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(135deg, rgba(155, 98, 255, 0.1), rgba(255, 158, 96, 0.08));
      }

      .landing {
        width: min(95vw, 900px);
        text-align: center;
        padding: 3rem 2rem;
        position: relative;
        animation: pageFadeIn 220ms ease-out both;
      }

      .landing::before {
        content: "";
        position: absolute;
        inset: 8% 9%;
        border-radius: 30px;
        background: radial-gradient(circle at center, rgba(188, 118, 255, 0.28), rgba(252, 155, 105, 0.16) 35%, transparent 72%);
        filter: blur(48px);
        z-index: -1;
        pointer-events: none;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 3rem);
        letter-spacing: 0.02em;
      }

      .subtitle {
        margin: 0.85rem 0 2rem;
        font-size: clamp(1rem, 2.3vw, 1.2rem);
        color: #d8c7ff;
      }

      .stats-row {
        display: flex;
        gap: 1.5rem;
        justify-content: center;
        margin: 1rem 0 2rem;
        flex-wrap: wrap;
      }

      .stat-badge {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        padding: 0.6rem 1.2rem;
        font-size: 0.9rem;
        text-align: center;
      }

      .stat-badge strong {
        display: block;
        font-size: 1.4rem;
        color: #fbbf24;
        margin-bottom: 0.2rem;
      }

      .stat-badge small {
        color: #cbb8f4;
        font-size: 0.75rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .button-group {
        display: flex;
        gap: 0.75rem;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 1rem;
      }

      .blessing-button {
        padding: 0.85rem 1.8rem;
        border: 1px solid #c5b3ff;
        border-radius: 999px;
        background: linear-gradient(135deg, #7050c7, #4d75d8);
        color: #f9f5ff;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 180ms ease, box-shadow 220ms ease, filter 220ms ease;
        box-shadow: 0 0 0 rgba(142, 116, 255, 0);
      }

      .blessing-button:hover {
        transform: translateY(-2px);
        filter: brightness(1.07);
        box-shadow: 0 0 20px rgba(169, 136, 255, 0.65), 0 0 34px rgba(91, 149, 255, 0.35);
      }

      .blessing-button:active {
        transform: translateY(0);
      }

      .blessing-button:disabled {
        cursor: wait;
        opacity: 0.88;
        transform: none;
        filter: saturate(0.9);
      }

      .secondary-button {
        padding: 0.65rem 1.4rem;
        border: 1px solid rgba(197, 179, 255, 0.5);
        border-radius: 999px;
        background: rgba(112, 80, 199, 0.2);
        color: #d8c7ff;
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 180ms ease;
      }

      .secondary-button:hover {
        background: rgba(112, 80, 199, 0.35);
        border-color: #c5b3ff;
      }

      .discovery-count {
        margin-top: 0.85rem;
        font-size: 0.86rem;
        color: #cbb8f4;
      }

      .blessing-card {
        --rarity-color: #9a9aa4;
        --rarity-border: rgba(154, 154, 164, 0.5);
        --rarity-glow: rgba(154, 154, 164, 0.22);
        position: relative;
        border-radius: 14px;
        padding: 1.2rem;
        text-align: left;
        background: rgba(18, 13, 31, 0.64);
        border: 1px solid color-mix(in srgb, var(--rarity-border) 58%, transparent);
        box-shadow: 0 10px 24px color-mix(in srgb, var(--rarity-glow) 68%, transparent);
        backdrop-filter: blur(2px);
        transition: box-shadow 170ms ease, transform 170ms ease, border-color 170ms ease;
      }

      .blessing-card:hover {
        transform: translateY(-1px);
        border-color: color-mix(in srgb, var(--rarity-color) 72%, #fff 28%);
        box-shadow: 0 0 20px color-mix(in srgb, var(--rarity-glow) 88%, #fff 12%),
          inset 0 0 0 1px color-mix(in srgb, var(--rarity-color) 46%, transparent);
      }

      .blessing-card::before {
        content: "";
        position: absolute;
        inset: -20px -16px;
        border-radius: inherit;
        background: radial-gradient(circle at 50% 45%, color-mix(in srgb, var(--rarity-color) 20%, transparent), transparent 70%);
        filter: blur(22px);
        pointer-events: none;
        z-index: -1;
      }

      .blessing-card h2 {
        margin: 0;
        color: var(--rarity-color);
        font-size: 1.15rem;
      }

      .blessing-card p {
        margin: 0.55rem 0 0;
        color: #e1d8ff;
        line-height: 1.45;
      }

      .framework-view {
        margin-top: 0.8rem;
        text-align: left;
        max-height: 90vh;
        overflow-y: auto;
      }

      .framework-panel {
        padding: 1.4rem;
        border-radius: 16px;
      }

      .framework-top {
        display: grid;
        grid-template-columns: minmax(230px, 320px) minmax(0, 1fr);
        gap: 1.2rem;
        align-items: start;
      }

      .framework-image {
        min-height: 170px;
        border-radius: 12px;
        border: 1px solid color-mix(in srgb, var(--rarity-color) 25%, transparent);
        background: linear-gradient(140deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.01));
        display: grid;
        place-items: center;
        color: #e4d7ff;
        letter-spacing: 0.03em;
        font-size: 0.88rem;
      }

      .framework-name {
        margin: 0.9rem 0 0;
        font-size: 1.2rem;
      }

      .mini-stats {
        margin-top: 0.72rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
      }

      .mini-stats span {
        font-size: 0.74rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: #e6dcff;
        border: 1px solid rgba(228, 208, 255, 0.34);
        padding: 0.32rem 0.5rem;
        border-radius: 999px;
        background: rgba(20, 14, 36, 0.62);
      }

      .framework-title {
        margin: 0.35rem 0 0;
        font-size: clamp(1.55rem, 3.8vw, 2.2rem);
      }

      .framework-tagline {
        margin-top: 0.55rem;
        font-size: 1rem;
        color: #e6dcff;
      }

      .framework-section {
        margin-top: 1.6rem;
        padding-top: 1.3rem;
        border-top: 1px solid color-mix(in srgb, var(--rarity-color) 24%, transparent);
      }

      .framework-section h4 {
        margin: 0;
        font-size: 0.92rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: color-mix(in srgb, var(--rarity-color) 82%, #fff 18%);
      }

      .framework-section p {
        margin-top: 0.6rem;
        color: #f1e9ff;
        line-height: 1.72;
      }

      .reflection-section {
        margin-top: 1.6rem;
        padding: 1.2rem;
        border-radius: 12px;
        border: 1px solid rgba(106, 213, 237, 0.3);
        background: rgba(109, 213, 237, 0.08);
      }

      .reflection-section h4 {
        margin: 0;
        font-size: 0.92rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #6dd5ed;
      }

      .reflection-section p {
        margin-top: 0.8rem;
        color: #e8f4f8;
        line-height: 1.6;
        font-style: italic;
      }

      .action-row {
        margin-top: 1.5rem;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 0.75rem;
      }

      .back-button {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 1px solid rgba(197, 179, 255, 0.4);
        border-radius: 8px;
        background: rgba(18, 13, 31, 0.6);
        color: #d8c7ff;
        font-weight: 500;
        cursor: pointer;
        transition: all 180ms ease;
      }

      .back-button:hover {
        background: rgba(112, 80, 199, 0.2);
        border-color: #c5b3ff;
      }

      .share-button {
        padding: 0.75rem 1rem;
        border: 1px solid rgba(106, 213, 237, 0.4);
        border-radius: 8px;
        background: rgba(109, 213, 237, 0.1);
        color: #6dd5ed;
        font-weight: 500;
        cursor: pointer;
        transition: all 180ms ease;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }

      .share-button:hover {
        background: rgba(109, 213, 237, 0.2);
        border-color: #6dd5ed;
      }

      .stats-container {
        margin-top: 0.8rem;
        padding: 1rem;
      }

      .stat-row {
        margin-top: 0.9rem;
      }

      .stat-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 0.75rem;
      }

      .stat-label {
        font-size: 0.75rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(231, 220, 255, 0.68);
      }

      .stat-value {
        font-size: 0.86rem;
        color: #f3ecff;
        font-variant-numeric: tabular-nums;
      }

      .bar {
        margin-top: 0.46rem;
        width: 100%;
        height: 10px;
        border-radius: 999px;
        background: rgba(10, 8, 17, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }

      .bar i {
        display: block;
        height: 100%;
        width: 0;
        border-radius: inherit;
        background: linear-gradient(90deg, color-mix(in srgb, var(--rarity-color) 70%, #b39cff 30%), var(--rarity-color));
        transition: width 240ms ease-out;
      }

      .blessing-enter .bar i {
        width: var(--target-width, 0%);
      }

      .rarity-label {
        margin-top: 0.5rem;
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: color-mix(in srgb, var(--rarity-color) 85%, #fff 15%);
      }

      .rarity-common {
        --rarity-color: #b4bac8;
        --rarity-border: rgba(164, 172, 187, 0.55);
        --rarity-glow: rgba(146, 152, 165, 0.2);
      }

      .rarity-rare {
        --rarity-color: #7ea7ff;
        --rarity-border: rgba(126, 167, 255, 0.62);
        --rarity-glow: rgba(96, 146, 255, 0.24);
      }

      .rarity-epic {
        --rarity-color: #be8dff;
        --rarity-border: rgba(190, 141, 255, 0.66);
        --rarity-glow: rgba(188, 117, 255, 0.32);
      }

      .rarity-legendary {
        --rarity-color: #f1cc6a;
        --rarity-border: rgba(241, 204, 106, 0.75);
        --rarity-glow: rgba(251, 218, 113, 0.44);
        box-shadow: 0 0 26px rgba(251, 218, 113, 0.36),
          0 0 42px rgba(251, 186, 77, 0.2),
          inset 0 0 0 1px rgba(241, 204, 106, 0.44);
      }

      .blessing-enter {
        animation: blessingFade 450ms ease;
      }

      .rarity-epic.blessing-enter {
        animation: blessingFade 450ms ease, epicPulse 2.4s ease-in-out infinite;
      }

      .archive-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 1rem;
        margin-top: 1.5rem;
      }

      .archive-card {
        padding: 1rem;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.04);
        cursor: pointer;
        transition: all 180ms ease;
        text-decoration: none;
        color: inherit;
      }

      .archive-card:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateY(-2px);
      }

      .archive-card h5 {
        margin: 0;
        font-size: 1rem;
        color: #f3e8ff;
      }

      .archive-card p {
        margin: 0.5rem 0 0;
        font-size: 0.85rem;
        color: #cbb8f4;
      }

      .archive-card .category-tag {
        display: inline-block;
        margin-top: 0.75rem;
        font-size: 0.7rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        padding: 0.3rem 0.6rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 16px;
        backdrop-filter: blur(10px);
        box-shadow: 0 14px 36px rgba(86, 40, 140, 0.22);
      }

      @keyframes epicPulse {
        0%, 100% {
          box-shadow: 0 0 15px rgba(188, 117, 255, 0.24),
            inset 0 0 0 1px rgba(190, 141, 255, 0.34);
        }
        50% {
          box-shadow: 0 0 24px rgba(188, 117, 255, 0.38),
            inset 0 0 0 1px rgba(190, 141, 255, 0.5);
        }
      }

      @keyframes blessingFade {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes pageFadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @media (max-width: 780px) {
        .landing {
          padding: 2rem 1rem;
        }

        .framework-top {
          grid-template-columns: 1fr;
        }

        .stats-row {
          gap: 1rem;
        }

        .button-group {
          gap: 0.5rem;
        }

        .archive-grid {
          grid-template-columns: 1fr;
        }
      }

      @media print {
        :root {
          color-scheme: light;
        }

        body {
          background: #fff;
          color: #000;
          display: block;
          min-height: auto;
          padding: 0;
          margin: 0;
          font-size: 12pt;
        }

        .landing {
          width: 100%;
          max-width: none;
          padding: 0;
        }

        .blessing-card {
          background: #fff;
          border: 1px solid #111;
          color: #000;
          box-shadow: none;
          backdrop-filter: none;
        }

        .no-print {
          display: none !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="landing">
      <section id="shrineShell">
        <h1>The Shrine of Knowledge</h1>
        <p class="subtitle">Daily wisdom quest—one framework each day</p>

        <div class="stats-row">
          <div class="stat-badge">
            <strong id="streakCount">0</strong>
            <small>Day Streak</small>
          </div>
          <div class="stat-badge">
            <strong id="discoveredCount">0</strong>
            <small>Discovered</small>
          </div>
          <div class="stat-badge">
            <strong id="totalCount">43</strong>
            <small>Total</small>
          </div>
        </div>

        <div class="button-group">
          <button class="blessing-button no-print" id="blessBtn" type="button">Receive Today's Blessing</button>
          <button class="secondary-button no-print" id="archiveBtn" type="button">View Archive</button>
        </div>

        <p class="discovery-count" id="discoveryCount" aria-live="polite"></p>
      </section>

      <section class="framework-view" id="frameworkView" aria-live="polite" hidden></section>
    </main>

    <script>
      const UI_TEXT = {
        loading: "Loading frameworks...",
        loadError: "Could not load frameworks.",
        idleButton: "Receive Today's Blessing",
        loadingButton: "Channeling wisdom...",
        ready: "Today's blessing is waiting. Enter when ready.",
      };

      const REFLECTION_PROMPTS = {
        "How Do I Think More Clearly?": "How could this lens change how you perceive a situation you face?",
        "How Do I Make Better Decisions?": "What decision could you improve by using this framework?",
        "How Do I Communicate More Effectively?": "Who could benefit from understanding this concept?",
        "How Do I Get More Done with Less Friction?": "What task could you complete faster with this mindset?",
        "How Do I Keep Improving?": "What small experiment could test this idea tomorrow?",
        "How Do I Build a Career, Not Just Do a Job?": "How does this practice build long-term professional capital?",
      };

      const STORAGE_KEY = "dailyBlessing";
      const DISCOVERED_KEY = "discoveredFrameworks";
      const LAST_VISIT_KEY = "lastVisitDate";

      const state = {
        frameworks: [],
        todaysBlessingId: null,
        discoveredFrameworks: [],
      };

      const elements = {
        button: document.getElementById("blessBtn"),
        archiveBtn: document.getElementById("archiveBtn"),
        shrineShell: document.getElementById("shrineShell"),
        frameworkView: document.getElementById("frameworkView"),
        discoveryCount: document.getElementById("discoveryCount"),
        streakCount: document.getElementById("streakCount"),
        discoveredCount: document.getElementById("discoveredCount"),
        totalCount: document.getElementById("totalCount"),
      };

      const toDateString = (date) => date.toISOString().slice(0, 10);
      const getTodayString = () => toDateString(new Date());

      function getYesterdayString(todayString) {
        const yesterday = new Date(`${todayString}T00:00:00`);
        yesterday.setDate(yesterday.getDate() - 1);
        return toDateString(yesterday);
      }

      function readSavedBlessing() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return {};
        try {
          const parsed = JSON.parse(raw);
          return parsed && typeof parsed === "object" ? parsed : {};
        } catch {
          return {};
        }
      }

      function readDiscoveredFrameworks() {
        const raw = localStorage.getItem(DISCOVERED_KEY);
        if (!raw) return [];
        try {
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      function getStreak() {
        const lastVisit = localStorage.getItem(LAST_VISIT_KEY);
        const today = getTodayString();
        const yesterday = getYesterdayString(today);

        if (!lastVisit) {
          localStorage.setItem(LAST_VISIT_KEY, today);
          return 1;
        }

        if (lastVisit === today) {
          const raw = localStorage.getItem("currentStreak");
          return parseInt(raw, 10) || 1;
        }

        if (lastVisit === yesterday) {
          const raw = localStorage.getItem("currentStreak");
          const streak = (parseInt(raw, 10) || 1) + 1;
          localStorage.setItem("currentStreak", streak);
          localStorage.setItem(LAST_VISIT_KEY, today);
          return streak;
        }

        localStorage.setItem(LAST_VISIT_KEY, today);
        localStorage.setItem("currentStreak", "1");
        return 1;
      }

      function saveBlessing(blessing) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(blessing));
      }

      function saveDiscoveredFramework(frameworkId) {
        const discovered = readDiscoveredFrameworks();
        if (!discovered.includes(frameworkId)) {
          discovered.push(frameworkId);
          localStorage.setItem(DISCOVERED_KEY, JSON.stringify(discovered));
          state.discoveredFrameworks = discovered;
        }
      }

      function setStatus(message) {
        elements.discoveryCount.textContent = message;
      }

      function hideBlessingButton() {
        elements.button.hidden = true;
      }

      function showView({ detail, archive }) {
        elements.frameworkView.hidden = !detail && !archive;
        elements.shrineShell.hidden = detail || archive;
      }

      function pickFramework(excludedId = null) {
        const candidates =
          excludedId && state.frameworks.length > 1
            ? state.frameworks.filter((framework) => framework.id !== excludedId)
            : state.frameworks;

        if (candidates.length === 0) return null;
        return candidates[Math.floor(Math.random() * candidates.length)];
      }

      function updateStats() {
        const streak = getStreak();
        const discovered = state.discoveredFrameworks.length;
        const total = state.frameworks.length;

        elements.streakCount.textContent = streak;
        elements.discoveredCount.textContent = discovered;
        elements.totalCount.textContent = total;
        elements.discoveryCount.textContent = `${discovered}/${total} frameworks discovered`;
      }

      function renderBlessing(framework) {
        const rarityClass = `rarity-${(framework.rarity || "Common").toLowerCase()}`;
        const stats = framework.stats || {};
        const adaptability = Number(stats.adaptability || 0);
        const logic = Number(stats.logic || 0);
        const efficiency = Number(stats.efficiency || 0);

        showView({ detail: true });
        const descriptionText = framework.description || "This framework gives you a structured way to reason about choices.";
        const mechanicsText = framework.mechanics || descriptionText;
        const flavorText = framework.flavor || "\"Wisdom sharpens where reflection meets action.\"";
        const reflectionPrompt = REFLECTION_PROMPTS[framework.category] || "How could you apply this today?";

        const shareUrl = `${window.location.origin}?framework=${framework.id}`;
        const shareText = `Today's framework: ${framework.name} - "${framework.tagline}" via The Shrine of Knowledge`;

        elements.frameworkView.innerHTML = `
          <article class="blessing-card blessing-enter framework-panel ${rarityClass}">
            <div class="framework-top">
              <div class="framework-left">
                <div class="framework-image" role="img" aria-label="${framework.name}">
                  ${framework.category.split('?')[1] || framework.category}
                </div>
                <h3 class="framework-name">${framework.name}</h3>
                <div class="mini-stats">
                  <span>${framework.category.split('?')[1] || framework.category}</span>
                  <span>ADP ${adaptability}</span>
                  <span>LOG ${logic}</span>
                  <span>EFF ${efficiency}</span>
                </div>
              </div>
              <div class="framework-right">
                <p class="rarity-label">${framework.rarity || "Common"}</p>
                <h2 class="framework-title">${framework.name}</h2>
                <p class="framework-tagline">${framework.tagline || "A framework for better thinking."}</p>
              </div>
            </div>

            <div class="framework-section">
              <h4>What It Is</h4>
              <p>${descriptionText}</p>
            </div>

            <div class="framework-section">
              <h4>How To Use It</h4>
              <p>${mechanicsText}</p>
            </div>

            <div class="framework-section">
              <h4>Quick Application</h4>
              <p>${framework.application || "Apply this framework to your next challenge."}</p>
            </div>

            <div class="reflection-section">
              <h4>🤔 Reflection</h4>
              <p>${reflectionPrompt}</p>
            </div>

            <section class="framework-section">
              <h4>Stats</h4>
              <div class="stats-container glass-card">
                <div class="stat-row">
                  <div class="stat-head">
                    <span class="stat-label">Adaptability</span>
                    <span class="stat-value">${adaptability}%</span>
                  </div>
                  <div class="bar"><i style="--target-width: ${adaptability}%"></i></div>
                </div>
                <div class="stat-row">
                  <div class="stat-head">
                    <span class="stat-label">Logic Flow</span>
                    <span class="stat-value">${logic}%</span>
                  </div>
                  <div class="bar"><i style="--target-width: ${logic}%"></i></div>
                </div>
                <div class="stat-row">
                  <div class="stat-head">
                    <span class="stat-label">Efficiency</span>
                    <span class="stat-value">${efficiency}%</span>
                  </div>
                  <div class="bar"><i style="--target-width: ${efficiency}%"></i></div>
                </div>
              </div>
            </section>

            <div class="framework-section" style="opacity: 0.8;">
              <h4>Wisdom</h4>
              <p style="font-style: italic; color: #dacdf4;">${flavorText}</p>
            </div>

            <div class="action-row no-print">
              <button class="back-button" id="backToShrine" type="button">← Back</button>
              <a class="share-button" href="https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(shareUrl)}" target="_blank" rel="noopener">
                Share 𝕏
              </a>
              <button class="share-button" id="copyLink" type="button">
                Copy Link
              </button>
              <button class="back-button" id="saveAsPdf" type="button">Print</button>
            </div>
          </article>
        `;

        bindDetailActions(shareUrl);
      }

      function renderArchive() {
        showView({ detail: false, archive: true });

        const discovered = state.frameworks.filter((f) => state.discoveredFrameworks.includes(f.id));
        const undiscovered = state.frameworks.filter((f) => !state.discoveredFrameworks.includes(f.id));

        const groupBy = (arr, key) => {
          const groups = {};
          arr.forEach((item) => {
            const category = item.category;
            if (!groups[category]) groups[category] = [];
            groups[category].push(item);
          });
          return groups;
        };

        const discoveredGroups = groupBy(discovered, "category");
        const undiscoveredGroups = groupBy(undiscovered, "category");

        let html = `
          <article class="blessing-card framework-panel rarity-rare">
            <h2 class="framework-title">Your Knowledge Archive</h2>
            <p style="color: #cbb8f4; margin-top: 1rem;">
              ${state.discoveredFrameworks.length} of ${state.frameworks.length} frameworks discovered
            </p>
        `;

        if (discovered.length > 0) {
          html += `<h3 style="margin-top: 2rem; margin-bottom: 1rem; color: #34d399;">📚 Discovered</h3>`;
          html += `<div class="archive-grid">`;
          discovered.forEach((f) => {
            html += `
              <div class="archive-card" data-framework-id="${f.id}">
                <h5>${f.name}</h5>
                <p>"${f.tagline}"</p>
                <div class="category-tag">${f.category.split('?')[1] || f.category}</div>
              </div>
            `;
          });
          html += `</div>`;
        }

        if (undiscovered.length > 0) {
          html += `<h3 style="margin-top: 2rem; margin-bottom: 1rem; color: #cbb8f4;">🔒 Awaiting Discovery</h3>`;
          html += `<div class="archive-grid">`;
          undiscovered.forEach((f) => {
            html += `
              <div class="archive-card" style="opacity: 0.6;">
                <h5>${f.name}</h5>
                <p>"${f.tagline}"</p>
                <div class="category-tag">Coming soon</div>
              </div>
            `;
          });
          html += `</div>`;
        }

        html += `
            <div class="action-row" style="margin-top: 2rem;">
              <button class="back-button" id="backToShrine" type="button">← Back to Shrine</button>
            </div>
          </article>
        `;

        elements.frameworkView.innerHTML = html;
        document.getElementById("backToShrine").addEventListener("click", () => showView({ detail: false, archive: false }));
      }

      function bindDetailActions(shareUrl) {
        const backButton = document.getElementById("backToShrine");
        const copyLink = document.getElementById("copyLink");
        const saveAsPdfButton = document.getElementById("saveAsPdf");

        backButton?.addEventListener("click", () => showView({ detail: false }));
        copyLink?.addEventListener("click", () => {
          navigator.clipboard.writeText(shareUrl);
          copyLink.textContent = "✓ Copied!";
          setTimeout(() => {
            copyLink.textContent = "Copy Link";
          }, 2000);
        });
        saveAsPdfButton?.addEventListener("click", () => window.print());
      }

      async function loadFrameworks() {
        elements.button.disabled = true;
        setStatus(UI_TEXT.loading);

        try {
          const response = await fetch("./frameworks.json");
          state.frameworks = await response.json();
          state.discoveredFrameworks = readDiscoveredFrameworks();

          const blessing = readSavedBlessing();
          const today = getTodayString();
          if (blessing.date === today) {
            state.todaysBlessingId = blessing.id;
            const todaysFramework = state.frameworks.find((item) => item.id === state.todaysBlessingId);
            if (todaysFramework) {
              renderBlessing(todaysFramework);
              hideBlessingButton();
              saveDiscoveredFramework(todaysFramework.id);
            }
            setStatus(UI_TEXT.ready);
          } else {
            updateStats();
          }

          elements.button.disabled = false;
        } catch {
          setStatus(UI_TEXT.loadError);
        }
      }

      function resolveTodaysBlessing() {
        const savedToday = state.frameworks.find((item) => item.id === state.todaysBlessingId);
        if (savedToday) return savedToday;

        const previous = readSavedBlessing();
        const today = getTodayString();
        const yesterday = getYesterdayString(today);
        const excludedId = previous.date === yesterday ? previous.id : null;
        const framework = pickFramework(excludedId);

        if (!framework) return null;

        state.todaysBlessingId = framework.id;
        saveBlessing({ id: framework.id, date: today });
        saveDiscoveredFramework(framework.id);
        return framework;
      }

      async function onBlessClick() {
        if (state.frameworks.length === 0 || elements.button.disabled) return;

        elements.button.disabled = true;
        elements.button.textContent = UI_TEXT.loadingButton;

        const framework = resolveTodaysBlessing();
        if (framework) {
          renderBlessing(framework);
          hideBlessingButton();
          updateStats();
        }

        await new Promise((resolve) => setTimeout(resolve, 420));
        elements.button.textContent = UI_TEXT.idleButton;
        elements.button.disabled = false;
      }

      elements.button.addEventListener("click", onBlessClick);
      elements.archiveBtn?.addEventListener("click", renderArchive);
      loadFrameworks();
    </script>
  </body>
</html>
