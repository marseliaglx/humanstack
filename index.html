<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shrine of Knowledge</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shrine">
      <p class="eyebrow">Arcane Archive</p>
      <h1>Shrine of Knowledge</h1>
      <p class="subtitle">Draw one Wisdom Blessing from your playbook.</p>

      <button id="drawBlessing" type="button">Receive Blessing</button>

      <section id="blessingCard" class="card" aria-live="polite">
        <h2 id="frameworkName">Awaiting your invocation…</h2>
        <p id="frameworkBlessing">Press the button to reveal a random framework.</p>
      </section>
    </main>

    <script>
      const drawButton = document.getElementById("drawBlessing");
      const frameworkName = document.getElementById("frameworkName");
      const frameworkBlessing = document.getElementById("frameworkBlessing");

      async function loadFrameworks() {
        const response = await fetch("frameworks.json");

        if (!response.ok) {
          throw new Error("Could not load frameworks.json");
        }

        return response.json();
      }

      function pickRandomFramework(frameworks) {
        const randomIndex = Math.floor(Math.random() * frameworks.length);
        return frameworks[randomIndex];
      }

      async function drawBlessing() {
        try {
          drawButton.disabled = true;
          drawButton.textContent = "Channeling…";

          const frameworks = await loadFrameworks();
          const blessing = pickRandomFramework(frameworks);

          frameworkName.textContent = blessing.name;
          frameworkBlessing.textContent = blessing.blessing;
        } catch (error) {
          frameworkName.textContent = "The shrine is silent";
          frameworkBlessing.textContent = "Unable to load your playbook right now.";
          console.error(error);
        } finally {
          drawButton.disabled = false;
          drawButton.textContent = "Receive Blessing";
        }
      }

      drawButton.addEventListener("click", drawBlessing);
    </script>
  </body>
</html>
